<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ўзбек тилининг изоҳли луғати</title>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #fff;
  --border: rgba(0,0,0,0.09);
  --border-mid: rgba(0,0,0,0.16);
  --text: #1c1c1a;
  --muted: #6a6a66;
  --hint: #9a9a95;
  --accent: #0F6E56;
  --accent-bg: #E1F5EE;
  --accent-dark: #085041;
  --hl: #FAC775;
  --ru: #185FA5;
  --ru-bg: #E6F1FB;
  --warn: #BA7517;
  --warn-bg: #FAEEDA;
  --danger: #A32D2D;
  --danger-bg: #FCEBEB;
  --r: 10px; --rsm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--text)}

header{background:var(--surface);border-bottom:0.5px solid var(--border-mid);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.header-left h1{font-size:16px;font-weight:600;letter-spacing:-.2px}
.header-left .sub{font-size:12px;color:var(--muted);font-family:sans-serif}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.tg{display:flex;border:0.5px solid var(--border-mid);border-radius:var(--rsm);overflow:hidden;font-family:sans-serif;font-size:12px}
.tg button{padding:5px 11px;border:none;background:transparent;cursor:pointer;color:var(--muted);transition:background .12s,color .12s;white-space:nowrap}
.tg button.active{background:var(--accent);color:#fff}
.tg button+button{border-left:0.5px solid var(--border-mid)}
.tg button:disabled{opacity:.4;cursor:default}

.icon-btn{padding:5px 10px;border:0.5px solid var(--border-mid);border-radius:var(--rsm);background:transparent;cursor:pointer;color:var(--muted);font-family:sans-serif;font-size:12px;transition:background .12s,color .12s}
.icon-btn.warn{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}

.search-row{padding:.75rem 1.5rem;background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;gap:10px;align-items:center}
.search-row input{flex:1;font-size:15px;padding:8px 13px;border:0.5px solid var(--border-mid);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-family:'Georgia',serif;outline:none}
.search-row input:focus{border-color:var(--accent)}
.rc{font-size:12px;color:var(--hint);font-family:sans-serif;white-space:nowrap}

.alpha-bar{padding:6px 1.5rem;background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;flex-wrap:wrap;gap:1px;font-family:sans-serif}
.alpha-bar button{padding:3px 7px;font-size:11px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:4px;transition:background .1s,color .1s}
.alpha-bar button:hover{background:var(--accent-bg);color:var(--accent-dark)}
.alpha-bar button.active{background:var(--accent);color:#fff}

.edit-banner{display:none;align-items:center;justify-content:space-between;gap:1rem;padding:8px 1.5rem;background:var(--warn-bg);border-bottom:0.5px solid var(--warn);font-family:sans-serif;font-size:12px;color:var(--warn)}
.edit-banner.show{display:flex}
.edit-banner strong{font-weight:600}
.banner-actions{display:flex;gap:8px;align-items:center}
.dl-btn{padding:5px 14px;background:var(--warn);color:#fff;border:none;border-radius:var(--rsm);cursor:pointer;font-size:12px;font-family:sans-serif}
.dl-btn:hover{opacity:.85}

.status{display:none;align-items:center;gap:10px;padding:8px 1.5rem;font-size:12px;color:var(--muted);font-family:sans-serif;background:var(--accent-bg);border-bottom:0.5px solid var(--border)}
.status.show{display:flex}
.pt{flex:1;height:3px;background:var(--border-mid);border-radius:2px;max-width:180px}
.pf{height:100%;background:var(--accent);border-radius:2px;transition:width .2s;width:0}

main{max-width:960px;margin:0 auto;padding:1rem 1.5rem 4rem}

.letter-group{margin-top:1.5rem}
.letter-heading{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint);font-family:sans-serif;padding-bottom:5px;border-bottom:0.5px solid var(--border);margin-bottom:2px}

.entry{display:grid;grid-template-columns:200px 1fr auto;border-bottom:0.5px solid var(--border);padding:9px 0;gap:0;transition:background .08s;align-items:start}
.entry:hover{background:var(--accent-bg);margin:0 -1.5rem;padding:9px 1.5rem}
.entry.deleted{opacity:.35;text-decoration:line-through}
.entry-left{padding-right:1.25rem}
.entry-word{font-size:14px;font-weight:600;line-height:1.4}
.entry-ru-row{margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.entry-ru{font-size:12px;color:var(--ru);font-family:sans-serif;font-style:italic}
.entry-ru.empty{color:var(--hint);font-style:normal}
.entry-def{font-size:13px;color:var(--muted);line-height:1.6;padding-right:.5rem}

.entry-actions{display:none;flex-direction:column;gap:4px;padding-left:8px;min-width:60px}
.edit-mode .entry-actions{display:flex}

.act-btn{padding:3px 8px;font-size:11px;font-family:sans-serif;border-radius:3px;cursor:pointer;border:0.5px solid var(--border-mid);background:transparent;color:var(--muted);white-space:nowrap;transition:border-color .1s,color .1s,background .1s}
.act-btn:hover{border-color:var(--accent);color:var(--accent)}
.act-btn.del{color:var(--danger)}
.act-btn.del:hover{background:var(--danger-bg);border-color:var(--danger)}
.act-btn.restore{color:var(--accent)}

.inline-editor{display:none;margin-top:6px;background:var(--surface);border:0.5px solid var(--border-mid);border-radius:var(--rsm);padding:10px;grid-column:1/-1}
.inline-editor.show{display:block}
.ie-label{font-size:11px;font-family:sans-serif;color:var(--muted);margin-bottom:4px}
.ie-input{width:100%;font-size:13px;font-family:'Georgia',serif;padding:6px 10px;border:0.5px solid var(--border-mid);border-radius:var(--rsm);color:var(--text);background:var(--bg);outline:none;resize:vertical}
.ie-input:focus{border-color:var(--accent)}
.ie-input.ru{font-family:sans-serif;color:var(--ru);resize:none;height:36px}
.ie-actions{display:flex;gap:6px;margin-top:6px}
.ie-ok{padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;font-family:sans-serif}
.ie-cancel{padding:4px 10px;background:transparent;border:0.5px solid var(--border-mid);border-radius:3px;cursor:pointer;font-size:12px;font-family:sans-serif;color:var(--muted)}

mark{background:var(--hl);color:var(--text);border-radius:2px;padding:0 1px}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-family:sans-serif;font-size:14px}

@media(max-width:580px){
  .entry{grid-template-columns:1fr auto}
  .entry-left{padding-right:0;margin-bottom:3px;grid-column:1}
  .entry-def{grid-column:1/-1}
  header,.search-row,.alpha-bar,main{padding-left:1rem;padding-right:1rem}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Ўзбек тилининг изоҳли луғати</h1>
    <div class="sub" id="h-sub">Юкланмоқда...</div>
  </div>
  <div class="controls">
    <div class="tg" id="script-tg">
      <button class="active" onclick="setScript('cyr')">Кирилл</button>
      <button onclick="setScript('lat')">Latin</button>
    </div>
    <div class="tg" id="lang-tg">
      <button class="active" onclick="setLang('uz')">Ўзбек</button>
      <button onclick="setLang('ru')" id="btn-ru">Русский</button>
    </div>
    <button class="icon-btn" id="edit-btn" onclick="toggleEdit()">✏️ Таҳрир</button>
  </div>
</header>

<div class="search-row">
  <input type="search" id="search" placeholder="Сўз қидиринг..." autocomplete="off"/>
  <span class="rc" id="rc"></span>
</div>
<div class="alpha-bar" id="alpha-bar"></div>

<div class="edit-banner" id="edit-banner">
  <span><strong>Таҳрир режими:</strong> сўзни ўзгартириш, таржимани тузатиш ёки ёзувни ўчириш мумкин</span>
  <div class="banner-actions">
    <span id="change-count" style="font-size:11px"></span>
    <button class="dl-btn" id="patch-btn" onclick="exportPatch()" style="opacity:.4;cursor:default" disabled>⬇ Патч юклаш</button>
    <button class="dl-btn" style="background:var(--accent);margin-left:4px" onclick="exportJSON()">⬇ JSON юклаш</button>
  </div>
</div>

<div class="status" id="status">
  <span id="status-txt">Юкланмоқда...</span>
  <div class="pt"><div class="pf" id="pf"></div></div>
</div>

<main id="main"><div class="empty-state">Юкланмоқда...</div></main>

<script>
const CYR_MAP=[['Ё','Yo'],['ё','yo'],['Ю','Yu'],['ю','yu'],['Я','Ya'],['я','ya'],['Ж','J'],['ж','j'],['Х','X'],['х','x'],['Ц','Ts'],['ц','ts'],['Ч','Ch'],['ч','ch'],['Ш','Sh'],['ш','sh'],['Щ','Sh'],['щ','sh'],['Ъ',"'"],['ъ',"'"],['Ь',''],['ь',''],['А','A'],['а','a'],['Б','B'],['б','b'],['В','V'],['в','v'],['Г','G'],['г','g'],['Д','D'],['д','d'],['Е','E'],['е','e'],['З','Z'],['з','z'],['И','I'],['и','i'],['Й','Y'],['й','y'],['К','K'],['к','k'],['Л','L'],['л','l'],['М','M'],['м','m'],['Н','N'],['н','n'],['О','O'],['о','o'],['П','P'],['п','p'],['Р','R'],['р','r'],['С','S'],['с','s'],['Т','T'],['т','t'],['У','U'],['у','u'],['Ф','F'],['ф','f'],['Э','E'],['э','e'],['Ғ',"G'"],['ғ',"g'"],['Ҳ','H'],['ҳ','h'],['Қ','Q'],['қ','q'],['Ў',"O'"],['ў',"o'"]];
const UZ_CYR=['А','Б','В','Г','Д','Е','Ж','З','И','Й','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ч','Ш','Э','Ю','Я','Ғ','Қ','Ҳ','Ў'];
const UZ_LAT=['A','B','D','E','F','G',"G'",'H','I','J','K','L','M','N','O',"O'",'Q','R','S','T','U','V','X','Y','Z'];
const RU_AL=['А','Б','В','Г','Д','Е','Ж','З','И','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ц','Ч','Ш','Э','Ю','Я'];

let entries=[], script='cyr', lang='uz', activeAlpha=null, editMode=false, changes=0, timer=null;
let filteredCache=[], pageSize=100, currentPage=0, observer=null;
const patches={}; // word -> {word, def, ru, _deleted}

function c2l(s){let r=s;for(const[c,l]of CYR_MAP)r=r.split(c).join(l);return r}
function disp(s){return script==='lat'?c2l(s||''):(s||'')}

function setScript(s){
  script=s;
  document.getElementById('script-tg').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',(i===0&&s==='cyr')||(i===1&&s==='lat')));
  buildAlpha();render();
}
function setLang(l){
  lang=l;
  document.getElementById('lang-tg').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='uz')||(i===1&&l==='ru')));
  document.getElementById('search').placeholder=l==='ru'?'Поиск на русском...':(script==='lat'?"So'z qidiring...":'Сўз қидиринг...');
  activeAlpha=null;buildAlpha();render();
}
function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('edit-btn');
  btn.classList.toggle('warn',editMode);
  btn.textContent=editMode?'✏️ Ёпиш':'✏️ Таҳрир';
  document.getElementById('edit-banner').classList.toggle('show',editMode);
  document.getElementById('main').classList.toggle('edit-mode',editMode);
  render();
}

function buildAlpha(){
  const bar=document.getElementById('alpha-bar');
  const letters=lang==='ru'?RU_AL:(script==='lat'?UZ_LAT:UZ_CYR);
  bar.innerHTML='';
  const all=document.createElement('button');
  all.textContent=script==='lat'?'All':'Барча';
  if(!activeAlpha)all.classList.add('active');
  all.onclick=()=>{activeAlpha=null;buildAlpha();render();};
  bar.appendChild(all);
  for(const l of letters){
    const b=document.createElement('button');
    b.textContent=l;
    if(activeAlpha===l)b.classList.add('active');
    b.onclick=()=>{activeAlpha=l;buildAlpha();render();};
    bar.appendChild(b);
  }
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hl(t,q){if(!q)return esc(t);const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(t).replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>')}

function render(){clearTimeout(timer);timer=setTimeout(_render,80)}

function buildFiltered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let filtered=entries.map((e,i)=>({...e,_i:i})).filter(e=>{
    if(lang==='ru')return(e.ru||'').toLowerCase().includes(q);
    const w=disp(e.word).toLowerCase(), d=disp(e.def).toLowerCase(), ql=c2l(q);
    return w.includes(q)||d.includes(q)||w.includes(ql)||d.includes(ql);
  });
  if(activeAlpha){
    filtered=filtered.filter(e=>{
      const src=lang==='ru'?(e.ru||'').charAt(0).toUpperCase():disp(e.word).charAt(0).toUpperCase();
      return src===activeAlpha;
    });
  }
  return filtered;
}

function entryHTML(e, q){
  const i=e._i, w=disp(e.word), d=disp(e.def), ru=e.ru||'';
  const deleted=e._deleted?'deleted':'';
  return `<div class="entry ${deleted}" id="entry-${i}">
    <div class="entry-left">
      <div class="entry-word" id="word-${i}">${hl(w,lang==='uz'?q:'')}</div>
      <div class="entry-ru-row">
        <span class="entry-ru${ru?'':' empty'}" id="ru-${i}">${ru?hl(ru,lang==='ru'?q:''):'—'}</span>
      </div>
    </div>
    <div class="entry-def" id="def-${i}">${hl(d,lang==='uz'?q:'')}</div>
    <div class="entry-actions">
      ${e._deleted
        ?`<button class="act-btn restore" onclick="restoreEntry(${i})">↩ Тиклаш</button>`
        :`<button class="act-btn" onclick="openEditor(${i},'ru')">РУ тузатиш</button>
           <button class="act-btn" onclick="openEditor(${i},'def')">Изоҳ тузатиш</button>
           <button class="act-btn" onclick="openEditor(${i},'word')">Сўз тузатиш</button>
           <button class="act-btn del" onclick="deleteEntry(${i})">✕ Ўчириш</button>`
      }
    </div>
    <div class="inline-editor" id="ied-${i}"></div>
  </div>`;
}

function renderPage(filtered, page, q, append){
  const main=document.getElementById('main');
  const start=page*pageSize, end=start+pageSize;
  const slice=filtered.slice(start,end);
  if(!slice.length) return;

  // Group only this slice but keep letter headings coherent
  const grouped={};
  for(const e of slice){
    const letter=lang==='ru'?(e.ru||'?').charAt(0).toUpperCase():disp(e.word).charAt(0).toUpperCase();
    if(!grouped[letter])grouped[letter]=[];
    grouped[letter].push(e);
  }

  let html='';
  for(const letter of Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'uz'))){
    // Only add letter heading if first entry of this letter overall
    const firstOfLetter=filtered.findIndex(e=>{
      const l=lang==='ru'?(e.ru||'?').charAt(0).toUpperCase():disp(e.word).charAt(0).toUpperCase();
      return l===letter;
    });
    if(firstOfLetter>=start&&firstOfLetter<end){
      html+=`<div class="letter-group" id="lg-${letter}"><div class="letter-heading">${esc(letter)}</div>`;
    } else {
      const existing=document.getElementById(`lg-${letter}`);
      if(existing){
        // append to existing group
        for(const e of grouped[letter]) existing.insertAdjacentHTML('beforeend', entryHTML(e,q));
        continue;
      }
      html+=`<div class="letter-group" id="lg-${letter}">`;
    }
    for(const e of grouped[letter]) html+=entryHTML(e,q);
    html+='</div>';
  }

  if(append){
    // Remove sentinel before appending
    const sentinel=document.getElementById('scroll-sentinel');
    if(sentinel)sentinel.remove();
    main.insertAdjacentHTML('beforeend', html);
  } else {
    main.innerHTML=html;
  }

  // Add sentinel if more pages remain
  if(end < filtered.length){
    main.insertAdjacentHTML('beforeend','<div id="scroll-sentinel" style="height:40px;margin-top:1rem"></div>');
    attachObserver(filtered, page+1, q);
  }
}

function attachObserver(filtered, nextPage, q){
  if(observer) observer.disconnect();
  const sentinel=document.getElementById('scroll-sentinel');
  if(!sentinel) return;
  observer=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting){
      observer.disconnect();
      currentPage=nextPage;
      renderPage(filtered, nextPage, q, true);
    }
  },{rootMargin:'200px'});
  observer.observe(sentinel);
}

function _render(){
  const main=document.getElementById('main');
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(observer){observer.disconnect();observer=null;}

  filteredCache=buildFiltered();
  currentPage=0;
  const total=filteredCache.length;

  document.getElementById('rc').textContent=total
    ?`${total.toLocaleString()}`+(script==='lat'?' results':' натижа'):'';

  if(!filteredCache.length){main.innerHTML='<div class="empty-state">Ҳеч нарса топилмади.</div>';return}

  main.innerHTML='';
  renderPage(filteredCache, 0, q, false);
}

function openEditor(i, field){
  // Close any open editors first
  document.querySelectorAll('.inline-editor.show').forEach(el=>{
    if(el.id!==`ied-${i}`)el.classList.remove('show');
  });

  const box=document.getElementById(`ied-${i}`);
  const e=entries[i];
  const isRu=field==='ru', isDef=field==='def', isWord=field==='word';
  const label=isRu?'Рус таржимаси':isDef?'Изоҳ (таъриф)':'Сўз (бош сўз)';
  const val=isRu?(e.ru||''):isDef?e.def:e.word;
  const inputType=isRu||isWord?'input':'textarea';

  box.innerHTML=`
    <div class="ie-label">${label}</div>
    ${inputType==='textarea'
      ?`<textarea class="ie-input" id="ie-val-${i}" rows="4">${esc(val)}</textarea>`
      :`<input class="ie-input ru" id="ie-val-${i}" type="text" value="${esc(val)}">`
    }
    <div class="ie-actions">
      <button class="ie-ok" onclick="saveField(${i},'${field}')">✓ Сақлаш</button>
      <button class="ie-cancel" onclick="closeEditor(${i})">Бекор</button>
    </div>`;
  box.classList.add('show');
  const inp=document.getElementById(`ie-val-${i}`);
  inp.focus();
  if(inp.setSelectionRange)inp.setSelectionRange(inp.value.length,inp.value.length);
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Escape')closeEditor(i);
    if(ev.key==='Enter'&&inputType==='input')saveField(i,field);
  });
}

function closeEditor(i){
  const box=document.getElementById(`ied-${i}`);
  if(box)box.classList.remove('show');
}

function saveField(i, field){
  const inp=document.getElementById(`ie-val-${i}`);
  if(!inp)return;
  const val=inp.value.trim();
  entries[i][field]=val;
  recordPatch(i);
  closeEditor(i);

  // Update DOM in place without full re-render
  if(field==='ru'){
    const el=document.getElementById(`ru-${i}`);
    if(el){el.textContent=val||'—';el.className='entry-ru'+(val?'':' empty')}
  } else if(field==='def'){
    const el=document.getElementById(`def-${i}`);
    if(el)el.textContent=val;
  } else if(field==='word'){
    const el=document.getElementById(`word-${i}`);
    if(el)el.textContent=disp(val);
  }
}

function recordPatch(i){
  const e=entries[i];
  patches[e.word]={word:e.word, def:e.def, ru:e.ru||'', _deleted:e._deleted||false};
  changes++;
  document.getElementById('change-count').textContent=`${changes} та ўзгариш`;
  const pb=document.getElementById('patch-btn');
  pb.disabled=false; pb.style.opacity='1'; pb.style.cursor='pointer';
}

function deleteEntry(i){
  entries[i]._deleted=true;
  recordPatch(i);
  const el=document.getElementById(`entry-${i}`);
  if(el){
    el.classList.add('deleted');
    const actions=el.querySelector('.entry-actions');
    if(actions)actions.innerHTML=`<button class="act-btn restore" onclick="restoreEntry(${i})">↩ Тиклаш</button>`;
  }
}

function restoreEntry(i){
  entries[i]._deleted=false;
  recordPatch(i);
  render();
}

function exportPatch(){
  const patchList=Object.values(patches);
  if(!patchList.length){alert('Ўзгаришлар йўқ.');return;}
  const out={
    created: new Date().toISOString(),
    count: patchList.length,
    patches: patchList
  };
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`lugat_patch_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportJSON(){
  const clean=entries
    .filter(e=>!e._deleted)
    .map(e=>({word:e.word,def:e.def,ru:e.ru||''}));
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='dictionary_enriched.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function load(){
  const status=document.getElementById('status');
  status.classList.add('show');
  try{
    let resp=await fetch('dictionary_enriched.json');
    document.getElementById('status-txt').textContent=resp.ok?'dictionary_enriched.json...':'dictionary_parsed.json...';
    document.getElementById('pf').style.width='30%';
    if(!resp.ok)resp=await fetch('dictionary_parsed.json');
    document.getElementById('pf').style.width='70%';
    const raw=await resp.json();
    entries=Array.isArray(raw)?raw:Object.values(raw);
    document.getElementById('pf').style.width='100%';
    document.getElementById('h-sub').textContent=`${entries.length.toLocaleString()} та сўз`;
    const hasRu=entries.some(e=>e.ru);
    document.getElementById('btn-ru').disabled=!hasRu;
    status.classList.remove('show');
    buildAlpha();render();
  }catch(err){
    document.getElementById('status-txt').textContent='Хато: '+err.message;
    document.getElementById('pf').style.background='#E24B4A';
    document.getElementById('pf').style.width='100%';
  }
}

document.getElementById('search').addEventListener('input',render);
load();
</script>
</body>
</html>
