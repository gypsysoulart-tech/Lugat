<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="O'zbek Lug'ati">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'zbek lug'ati</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Apple system font stack */
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "JetBrains Mono", ui-monospace, monospace;

  /* Light mode — Apple semantic colors */
  --bg:           #f2f2f7;
  --bg2:          #ffffff;
  --bg3:          #f2f2f7;
  --surface:      rgba(255,255,255,0.85);
  --surface-solid:#ffffff;
  --surface2:     rgba(118,118,128,0.12);
  --surface3:     rgba(118,118,128,0.20);
  --text:         #000000;
  --text2:        rgba(60,60,67,0.85);
  --text3:        rgba(60,60,67,0.50);
  --text4:        rgba(60,60,67,0.30);
  --separator:    rgba(60,60,67,0.20);
  --separator2:   rgba(60,60,67,0.12);

  /* Tints */
  --blue:        #0066CC;
  --blue-light:  rgba(0,102,204,0.12);
  --blue-text:   #0055b3;
  --green:       #28a745;
  --green-light: rgba(40,167,69,0.12);
  --orange:      #FF9500;
  --orange-light:rgba(255,149,0,0.12);
  --red:         #dc3545;
  --red-light:   rgba(220,53,69,0.12);
  --yellow:      #FFCC00;
  --yellow-light:rgba(255,204,0,0.18);
  --purple:      #6f42c1;
  --teal:        #20c997;
  --indigo:      #5856D6;

  /* Accent gradient */
  --accent-grad: linear-gradient(135deg, #0066CC 0%, #5856D6 100%);

  /* Radii */
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  20px;
  --r-2xl: 28px;

  /* Shadows */
  --shadow-sm:  0 1px 4px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 20px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:  0 12px 40px rgba(0,0,0,.13), 0 4px 12px rgba(0,0,0,.07);

  /* Spacing */
  --font-size-word: 16px;
  --font-size-def:  14px;
  --font-size-ru:   13px;
  --entry-padding:  14px;
}

[data-theme="dark"] {
  --bg:           #000000;
  --bg2:          #1c1c1e;
  --bg3:          #2c2c2e;
  --surface:      rgba(28,28,30,0.85);
  --surface-solid:#1c1c1e;
  --surface2:     rgba(118,118,128,0.22);
  --surface3:     rgba(118,118,128,0.32);
  --text:         #ffffff;
  --text2:        rgba(235,235,245,0.85);
  --text3:        rgba(235,235,245,0.50);
  --text4:        rgba(235,235,245,0.25);
  --separator:    rgba(84,84,88,0.65);
  --separator2:   rgba(84,84,88,0.35);
  --blue:         #3b9eff;
  --blue-light:   rgba(59,158,255,0.18);
  --blue-text:    #60aeff;
  --green:        #30D158;
  --green-light:  rgba(48,209,88,0.18);
  --orange:       #FF9F0A;
  --orange-light: rgba(255,159,10,0.18);
  --red:          #FF453A;
  --red-light:    rgba(255,69,58,0.18);
  --yellow:       #FFD60A;
  --yellow-light: rgba(255,214,10,0.20);
  --accent-grad:  linear-gradient(135deg, #3b9eff 0%, #7b6ee6 100%);
  --shadow-sm:  0 1px 4px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.25);
  --shadow-md:  0 4px 20px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.30);
  --shadow-lg:  0 12px 40px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.35);
}

[data-size="sm"] { --font-size-word:14px; --font-size-def:13px; --font-size-ru:12px; --entry-padding:10px; }
[data-size="md"] { --font-size-word:16px; --font-size-def:14px; --font-size-ru:13px; --entry-padding:14px; }
[data-size="lg"] { --font-size-word:18px; --font-size-def:16px; --font-size-ru:14px; --entry-padding:18px; }
[data-density="compact"]     { --entry-padding:8px; }
[data-density="normal"]      { --entry-padding:14px; }
[data-density="comfortable"] { --entry-padding:20px; }

html { background: var(--bg); }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.47;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; min-height: 100dvh; }

/* ── TOPBAR ── */
.topbar {
  height: 56px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--surface);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--separator2);
}

.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-icon {
  width: 34px; height: 34px;
  background: var(--accent-grad);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: #fff;
  letter-spacing: -.3px;
  flex-shrink: 0;
  font-family: var(--font);
  box-shadow: 0 2px 8px rgba(0,102,204,.3);
}
.brand-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.3px;
  color: var(--text);
}
.brand-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 20px;
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

/* Segmented control — Apple style */
.seg {
  display: flex;
  background: var(--surface2);
  border-radius: 9px;
  padding: 2px;
  gap: 0;
}
.seg button {
  height: 28px;
  padding: 0 12px;
  border: none;
  background: transparent;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font);
  letter-spacing: -.1px;
  white-space: nowrap;
}
.seg button.active {
  background: var(--surface-solid);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.seg button:disabled { opacity:.35; cursor:default; }

.icon-btn {
  height: 32px;
  padding: 0 12px;
  border: none;
  background: var(--surface2);
  border-radius: 8px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all .15s;
  font-family: var(--font);
  white-space: nowrap;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); }
.icon-btn.edit-active { background: var(--orange-light); color: var(--orange); }

.fav-topbtn {
  height: 32px;
  padding: 0 12px;
  border: none;
  background: var(--surface2);
  border-radius: 8px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all .15s;
  font-family: var(--font);
}
.fav-topbtn:hover { background: var(--yellow-light); color: var(--orange); }
.fav-count {
  background: var(--orange);
  color: #fff;
  border-radius: 10px;
  padding: 0 6px;
  font-size: 11px;
  font-weight: 600;
  display: none;
}
.fav-count.show { display: inline; }

/* ── SEARCH BAR ── */
.searchbar {
  padding: 10px 20px 8px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--surface);
  -webkit-backdrop-filter: saturate(200%) blur(24px);
  backdrop-filter: saturate(200%) blur(24px);
  border-bottom: 0.5px solid var(--separator2);
  position: sticky;
  top: 56px;
  z-index: 190;
}
.search-wrap {
  flex: 1;
  min-width: 0;
  max-width: 600px;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}
#search {
  width: 100%;
  height: 40px;
  padding: 0 38px;
  border: none;
  border-radius: 12px;
  background: var(--surface2);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  transition: background .15s, box-shadow .2s;
  -webkit-appearance: none;
}
#search:focus {
  background: var(--surface-solid);
  box-shadow: 0 0 0 3px var(--blue-light), var(--shadow-sm);
}
#search::placeholder { color: var(--text3); }
#search::-webkit-search-cancel-button { -webkit-appearance: none; }
.result-badge {
  font-size: 13px;
  color: var(--text3);
  font-weight: 500;
  white-space: nowrap;
}

/* Search dropdown */
.search-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--surface-solid);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  z-index: 300;
  overflow: hidden;
  border: 0.5px solid var(--separator2);
}
.search-dropdown.show { display: block; }
.sd-label {
  padding: 10px 14px 5px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--text3);
}
.sd-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  transition: background .08s;
}
.sd-item:hover { background: var(--surface2); }
.sd-item svg { color: var(--text4); flex-shrink: 0; }
.sd-clear {
  padding: 8px 14px;
  border-top: 0.5px solid var(--separator2);
  font-size: 12px;
  color: var(--red);
  cursor: pointer;
  text-align: center;
  transition: background .08s;
}
.sd-clear:hover { background: var(--red-light); }

/* ── ALPHA BAR ── */
.alphabar {
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
  height: 48px;
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 0.5px solid var(--separator2);
  -webkit-mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
  mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
}
.alphabar::-webkit-scrollbar { display: none; }
.alpha-btn {
  height: 32px;
  min-width: 32px;
  padding: 0 9px;
  border: none;
  background: transparent;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  color: var(--blue);
  cursor: pointer;
  transition: all .14s;
  font-family: var(--font-mono);
  white-space: nowrap;
  flex-shrink: 0;
}
.alpha-btn:hover { background: var(--blue-light); }
.alpha-btn.active { background: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(0,102,204,.28); }
.alpha-divider { width: 1px; height: 16px; background: var(--separator2); margin: 0 3px; flex-shrink: 0; }

/* ── EDIT BANNER ── */
.edit-banner {
  display: none;
  padding: 10px 20px;
  background: var(--orange-light);
  border-bottom: 0.5px solid rgba(255,149,0,.3);
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
  color: var(--orange);
}
.edit-banner.show { display: flex; }
.edit-banner strong { font-weight: 600; }
.banner-btns { display: flex; gap: 8px; align-items: center; }
.banner-btn {
  height: 30px;
  padding: 0 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: opacity .12s;
}
.banner-btn:hover { opacity: .85; }
.banner-btn.primary { background: var(--orange); color: #fff; }
.banner-btn.secondary { background: var(--surface2); color: var(--orange); }
.banner-btn:disabled { opacity: .35; cursor: default; }

/* ── STATUS BAR ── */
.status-bar {
  display: none;
  padding: 10px 20px;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text3);
  background: var(--bg2);
}
.status-bar.show { display: flex; }
.progress-track { flex: 1; max-width: 180px; height: 3px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--blue); border-radius: 10px; transition: width .2s; width: 0; }

/* ── SKELETON ── */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position: 600px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s infinite linear;
  border-radius: 6px;
}
[data-theme="dark"] .skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,.06) 25%, rgba(255,255,255,.12) 50%, rgba(255,255,255,.06) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s infinite linear;
}
.skeleton-entry {
  background: var(--bg2);
  border: 0.5px solid var(--separator2);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 6px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 12px;
}
.skeleton-word  { height: 16px; width: 120px; }
.skeleton-ru    { height: 12px; width: 80px;  margin-top: 8px; }
.skeleton-line1 { height: 13px; width: 100%; }
.skeleton-line2 { height: 13px; width: 75%;  margin-top: 6px; }
.skeleton-line3 { height: 13px; width: 55%;  margin-top: 6px; }

@media (max-width: 640px) {
  .skeleton-entry { grid-template-columns: 1fr; }
}

/* ── MAIN ── */
#main {
  max-width: 820px;
  margin: 0 auto;
  width: 100%;
  padding: 8px 20px 100px;
  flex: 1;
}

/* ── LETTER GROUP ── */
.letter-group { margin-top: 20px; }
.letter-head {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--blue);
  font-family: var(--font-mono);
  padding: 0 4px 10px;
  border-bottom: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.letter-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--separator2);
}

/* ── ENTRY ── */
.entry {
  display: grid;
  grid-template-columns: 200px 1fr;
  background: var(--bg2);
  border: 0.5px solid var(--separator2);
  border-radius: var(--r-lg);
  padding: var(--entry-padding) 16px;
  margin-bottom: 6px;
  gap: 0;
  cursor: pointer;
  transition: box-shadow .15s, border-color .15s;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.entry:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--separator);
}
.edit-mode .entry {
  grid-template-columns: 1fr;
  padding: var(--entry-padding) 16px;
  margin: 4px 0;
  background: var(--surface2);
  border-radius: var(--r-md);
  border: none;
  box-shadow: none;
}
.edit-mode .entry-left { padding-right: 0; margin-bottom: 6px; }
.edit-mode .entry-def { margin-bottom: 4px; }
.entry:last-child { margin-bottom: 0; }
.entry:active { opacity: .85; }
.entry.expanded {
  box-shadow: var(--shadow-md);
  border-color: var(--blue-light);
}
.entry.deleted { opacity: .35; }
.entry.deleted .entry-word { text-decoration: line-through; }

.entry-left { padding-right: 16px; min-width: 0; }

/* Russian translation + fav/share buttons row */
.entry-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  min-width: 0;
}

.entry-word {
  font-size: var(--font-size-word);
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -.3px;
  font-family: var(--font);
  min-width: 0;
  overflow-wrap: break-word;
}
.entry-ru {
  font-size: var(--font-size-ru);
  color: var(--blue);
  font-weight: 400;
  letter-spacing: -.1px;
  opacity: .85;
  flex: 1;
  min-width: 0;
}
.entry-ru.empty { color: var(--text4); opacity: 1; }
.entry-def {
  font-size: var(--font-size-def);
  color: var(--text2);
  line-height: 1.6;
  max-height: 4.9em;
  overflow: hidden;
  transition: max-height .4s cubic-bezier(0.4, 0, 0.2, 1);
}
.entry.expanded .entry-def { max-height: 30em; }
.entry-def.short { max-height: none; }
.expand-hint {
  display: none;
  margin-top: 6px;
  font-size: 12px;
  color: var(--blue);
  font-weight: 500;
  opacity: .8;
}
.entry:not(.expanded) .entry-def.clipped ~ .expand-hint { display: block; }

/* ── ENTRY ACTIONS ── */
.entry-actions {
  display: none;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 4px;
  grid-column: 1 / -1;
  margin-top: 6px;
}
/* On hover (non-edit) show as absolute overlay for copy only */
.entry:not(.edit-mode *):hover .entry-actions {
  display: flex;
  position: absolute;
  top: 12px; right: 12px;
  flex-direction: column;
  flex-wrap: nowrap;
  margin-top: 0;
  grid-column: unset;
}
/* Push definition text away from the hover button */
.entry:not(.edit-mode *):hover > div:nth-child(2) {
  padding-right: 56px;
}
.edit-mode .entry-actions { display: flex; }

.act {
  height: 26px;
  padding: 0 10px;
  border: none;
  border-radius: 7px;
  background: var(--surface-solid);
  color: var(--blue);
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  transition: all .1s;
}
.act:hover { background: var(--blue-light); }
.act.danger { color: var(--red); }
.act.danger:hover { background: var(--red-light); }
.act.restore { color: var(--green); }
.act.restore:hover { background: var(--green-light); }

/* ── INLINE EDITOR ── */
.inline-editor {
  display: none;
  grid-column: 1 / -1;
  margin-top: 10px;
  background: var(--bg2);
  border-radius: var(--r-md);
  padding: 14px;
  box-shadow: var(--shadow-md);
}
.inline-editor.show { display: block; }
.ie-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.ie-input {
  width: 100%;
  font-size: 14px;
  font-family: var(--font);
  padding: 9px 12px;
  border: none;
  border-radius: var(--r-sm);
  color: var(--text);
  background: var(--surface2);
  outline: none;
  resize: vertical;
  line-height: 1.5;
  transition: box-shadow .15s;
}
.ie-input:focus { box-shadow: 0 0 0 3px var(--blue-light); }
.ie-input.mono { font-family: var(--font-mono); }
.ie-actions { display: flex; gap: 8px; margin-top: 10px; }
.ie-ok {
  height: 32px; padding: 0 18px;
  background: var(--blue); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-size: 13px; font-family: var(--font); font-weight: 600;
  cursor: pointer;
  transition: opacity .12s;
}
.ie-ok:hover { opacity: .85; }
.ie-cancel {
  height: 32px; padding: 0 14px;
  background: var(--surface2); color: var(--text2);
  border: none; border-radius: var(--r-sm);
  font-size: 13px; font-family: var(--font); font-weight: 500;
  cursor: pointer;
}
.ie-cancel:hover { background: var(--surface3); }

/* ── HIGHLIGHT ── */
mark { background: var(--yellow-light); color: var(--text); border-radius: 3px; padding: 1px 2px; }

/* ── COPY TOAST ── */
.copy-toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--surface-solid);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  z-index: 1000;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  pointer-events: none;
  white-space: nowrap;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  opacity: 0;
  box-shadow: var(--shadow-lg);
  border: 0.5px solid var(--separator2);
}
.copy-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── FAV BUTTON IN ENTRY ── */
.fav-btn {
  background: none; border: none;
  cursor: pointer; padding: 2px;
  color: var(--text4);
  font-size: 15px; line-height: 1;
  transition: color .15s, transform .2s;
  flex-shrink: 0;
}
.fav-btn:hover { color: var(--orange); transform: scale(1.2); }
.fav-btn.active { color: var(--orange); }

/* ── SETTINGS PANEL ── */
.settings-panel {
  display: none;
  position: fixed;
  top: 64px; right: 16px;
  width: 290px;
  background: var(--surface-solid);
  border-radius: var(--r-2xl);
  box-shadow: var(--shadow-lg);
  z-index: 400;
  padding: 20px;
  border: 0.5px solid var(--separator2);
}
.settings-panel.open { display: block; }
.settings-section { margin-bottom: 20px; }
.settings-section:last-child { margin-bottom: 0; }
.settings-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  display: block;
}
.settings-row { display: flex; gap: 6px; }
.settings-btn {
  flex: 1;
  height: 36px;
  border: none;
  border-radius: var(--r-md);
  background: var(--surface2);
  color: var(--text2);
  font-size: 13px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  transition: all .12s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.settings-btn:hover { background: var(--surface3); color: var(--text); }
.settings-btn.active { background: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(0,102,204,.28); }

/* ── FAV PANEL ── */
.fav-panel {
  display: none;
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 360px;
  background: var(--surface-solid);
  border-left: 0.5px solid var(--separator2);
  z-index: 500;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.fav-panel.open { display: flex; }
.fav-header {
  padding: 20px 20px 16px;
  border-bottom: 0.5px solid var(--separator2);
  display: flex; align-items: center; justify-content: space-between;
}
.fav-header h2 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
.fav-close {
  width: 32px; height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--surface2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 14px;
  transition: background .12s;
}
.fav-close:hover { background: var(--surface3); }
.fav-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.fav-entry {
  padding: 12px 20px;
  margin: 0 8px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: background .08s;
}
.fav-entry:hover { background: var(--surface2); }
.fav-entry-word { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
.fav-entry-ru { font-size: 12px; color: var(--blue); margin-top: 2px; opacity: .85; }
.fav-empty { padding: 60px 20px; text-align: center; color: var(--text3); font-size: 14px; line-height: 1.7; }
.fav-footer {
  padding: 14px 20px;
  border-top: 0.5px solid var(--separator2);
  font-size: 13px;
  color: var(--text3);
  display: flex; justify-content: space-between; align-items: center;
}
.fav-clear { font-size: 13px; color: var(--red); cursor: pointer; background: none; border: none; font-family: var(--font); font-weight: 500; }
.fav-clear:hover { opacity: .75; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 16px; }
.empty-state p { font-size: 15px; font-weight: 500; }

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--separator2);
  z-index: 300;
  align-items: center;
  justify-content: space-around;
  padding: 8px 8px max(env(safe-area-inset-bottom), 8px);
}
.bn-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 4px 0;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text3);
  font-family: var(--font);
  font-size: 10px;
  font-weight: 500;
  transition: color .12s;
  border-radius: var(--r-sm);
  position: relative;
}
.bn-item svg { width: 22px; height: 22px; }
.bn-item.active { color: var(--blue); }
.bn-badge {
  position: absolute;
  top: 0; right: calc(50% - 20px);
  background: var(--red);
  color: #fff;
  border-radius: 10px;
  padding: 0 5px;
  font-size: 9px;
  font-weight: 700;
  min-width: 16px;
  text-align: center;
  display: none;
  border: 2px solid var(--bg);
}
.bn-badge.show { display: block; }


/* ── SHARE BUTTON ── */
.share-btn {
  background: none; border: none;
  cursor: pointer; padding: 2px 4px;
  color: var(--text4);
  font-size: 13px; line-height: 1;
  transition: color .15s;
  flex-shrink: 0;
}
.share-btn:hover { color: var(--blue); }

/* ── SEARCH SUGGESTIONS ── */
.suggestion-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: background .08s;
  border-bottom: 0.5px solid var(--separator2);
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: var(--surface2); }
.suggestion-word { font-weight: 600; font-family: var(--font-mono); font-size: 13px; }
.suggestion-ru { font-size: 12px; color: var(--blue); margin-left: auto; white-space: nowrap; }

/* ── RELATED WORDS ── */
.related-words {
  display: none;
  grid-column: 1 / -1;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid var(--separator2);
}
.entry.expanded .related-words { display: block; }
.related-label {
  font-size: 11px; font-weight: 600;
  color: var(--text3); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 8px;
}
.related-list { display: flex; flex-wrap: wrap; gap: 6px; }
.related-chip {
  padding: 5px 12px;
  background: var(--blue-light);
  color: var(--blue-text);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background .1s, color .1s;
  border: none;
}
.related-chip:hover { background: var(--blue); color: #fff; }

/* ── RECENT WORDS ── */
.recent-section {
  padding: 12px 20px;
  border-bottom: 0.5px solid var(--separator2);
}
.recent-label {
  font-size: 11px; font-weight: 600;
  color: var(--text3); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.recent-clear-btn { font-size: 11px; color: var(--red); cursor: pointer; background: none; border: none; font-family: var(--font); font-weight: 500; }
.recent-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.recent-chip {
  padding: 3px 9px;
  background: var(--surface2);
  border-radius: 20px;
  font-size: 12px;
  font-family: var(--font-mono);
  cursor: pointer;
  transition: background .1s;
  border: none;
  color: var(--text2);
}
.recent-chip:hover { background: var(--surface3); color: var(--text); }

/* ── KEYBOARD FOCUS ── */
.entry.kb-focus {
  outline: 2px solid var(--blue);
  outline-offset: 0;
  border-color: var(--blue-light);
  box-shadow: var(--shadow-md);
}

/* ── WORD TYPE BADGES ── */
.wbadge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text3);
  vertical-align: middle;
  margin: 0 1px;
  white-space: nowrap;
  font-family: var(--font);
}

/* ── SEARCH CLEAR BUTTON ── */
.search-clear {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  border: none;
  background: var(--surface3);
  color: var(--text3);
  cursor: pointer;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  line-height: 1;
  transition: background .12s, color .12s;
  z-index: 1;
}
.search-clear:hover { background: var(--separator); color: var(--text); }
.search-clear.show { display: flex; }

/* ── SEARCH SHORTCUT BADGE ── */
.search-shortcut {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--text4);
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 5px;
  pointer-events: none;
  font-family: var(--font);
  font-weight: 500;
  letter-spacing: -.1px;
  white-space: nowrap;
  border: 0.5px solid var(--separator2);
}

/* ── SCROLL TO TOP ── */
.scroll-top {
  position: fixed;
  bottom: 28px; right: 20px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--blue);
  color: #fff;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .22s, transform .22s;
  z-index: 250;
  pointer-events: none;
  font-size: 16px;
}
.scroll-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.scroll-top:hover { opacity: .88; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .topbar { padding: 0 16px; height: 52px; }
  .brand-name { display: none; }
  .topbar-right { display: none; }
  .searchbar {
    padding: 8px 16px;
    top: 52px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .search-wrap { flex: 1; min-width: 0; max-width: 100%; }
  .mobile-controls {
    display: flex !important;
    width: 100%;
    gap: 6px;
    padding-bottom: 2px;
  }
  .alphabar { padding: 0 12px; justify-content: flex-start; height: 44px; }
  #main { padding: 8px 12px 90px; }
  .entry { grid-template-columns: 1fr; }
  .entry-left { padding-right: 0; margin-bottom: 6px; }
  .edit-banner { padding: 10px 16px; flex-direction: column; gap: 8px; }
  .fav-panel { width: 100%; border-left: none; border-top: 0.5px solid var(--separator2); }
  .settings-panel { right: 12px; left: 12px; width: auto; top: auto; bottom: 72px; border-radius: var(--r-xl); }
  .copy-toast { bottom: 80px; }
  .scroll-top { bottom: 80px; right: 14px; }
  .bottom-nav { display: flex; }
}

/* mobile controls row - hidden on desktop */
.mobile-controls { display: none; }
</style>
</head>

<div class="app">

<script>
const CYR_MAP=[['Ё','Yo'],['ё','yo'],['Ю','Yu'],['ю','yu'],['Я','Ya'],['я','ya'],['Ж','J'],['ж','j'],['Х','X'],['х','x'],['Ц','Ts'],['ц','ts'],['Ч','Ch'],['ч','ch'],['Ш','Sh'],['ш','sh'],['Щ','Sh'],['щ','sh'],['Ъ',"'"],['ъ',"'"],['Ь',''],['ь',''],['А','A'],['а','a'],['Б','B'],['б','b'],['В','V'],['в','v'],['Г','G'],['г','g'],['Д','D'],['д','d'],['Е','E'],['е','e'],['З','Z'],['з','z'],['И','I'],['и','i'],['Й','Y'],['й','y'],['К','K'],['к','k'],['Л','L'],['л','l'],['М','M'],['м','m'],['Н','N'],['н','n'],['О','O'],['о','o'],['П','P'],['п','p'],['Р','R'],['р','r'],['С','S'],['с','s'],['Т','T'],['т','t'],['У','U'],['у','u'],['Ф','F'],['ф','f'],['Э','E'],['э','e'],['Ғ',"G'"],['ғ',"g'"],['Ҳ','H'],['ҳ','h'],['Қ','Q'],['қ','q'],['Ў',"O'"],['ў',"o'"]];
const UZ_CYR=['А','Б','В','Г','Д','Е','Ж','З','И','Й','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ч','Ш','Э','Ю','Я','Ғ','Қ','Ҳ','Ў'];
const UZ_LAT=['A','B','D','E','F','G',"G'",'H','I','J','K','L','M','N','O',"O'",'P','Q','R','S','T','U','V','X','Y','Z'];
const RU_AL=['А','Б','В','Г','Д','Е','Ж','З','И','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ц','Ч','Ш','Э','Ю','Я'];

let entries=[], script='lat', lang='uz', activeAlpha=null, editMode=false, changes=0, timer=null;
let filteredCache=[], pageSize=100, observer=null;
const patches={};

function c2l(s){let r=s;for(const[c,l]of CYR_MAP)r=r.split(c).join(l);return r}
function disp(s){return script==='lat'?c2l(s||''):(s||'')}
function dispE(e){return script==='lat'?(e._lat||c2l(e.word)):(e.word)}
function dispDef(e){return script==='lat'?(e._defLat||c2l(e.def)):(e.def)}

// Cyrillic → Latin letter equivalents
const CYR_TO_LAT_LETTER = {
  'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ж':'J','З':'Z',
  'И':'I','Й':'Y','К':'K','Л':'L','М':'M','Н':'N','О':'O','П':'P',
  'Р':'R','С':'S','Т':'T','У':'U','Ф':'F','Х':'X','Ч':'Ch','Ш':'Sh',
  'Э':'E','Ю':'Yu','Я':'Ya','Ғ':"G'",'Қ':'Q','Ҳ':'H','Ў':"O'"
};
const LAT_TO_CYR_LETTER = {
  'A':'А','B':'Б','D':'Д','E':'Э','F':'Ф','G':'Г',"G'":'Ғ','H':'Ҳ',
  'I':'И','J':'Ж','K':'К','L':'Л','M':'М','N':'Н','O':'О',"O'":'Ў',
  'P':'П','Q':'Қ','R':'Р','S':'С','T':'Т','U':'У','V':'В','X':'Х',
  'Y':'Й','Z':'З'
};

function setScript(s){
  if(activeAlpha){
    const mapped = s==='lat' ? CYR_TO_LAT_LETTER[activeAlpha] : LAT_TO_CYR_LETTER[activeAlpha];
    activeAlpha = mapped || null;
  }
  script=s;
  ['script-seg','script-seg-m'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',(i===0&&s==='lat')||(i===1&&s==='cyr')));
  });
  document.getElementById('search').placeholder=lang==='ru'?'Поиск на русском...':(s==='lat'?"So'z qidiring...":'Сўз қидиринг...');
  buildAlpha();render();
}
function setLang(l){
  lang=l;
  ['lang-seg','lang-seg-m'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='uz')||(i===1&&l==='ru')));
  });
  document.getElementById('search').placeholder=l==='ru'?'Поиск на русском...':(script==='lat'?"So'z qidiring...":'Сўз қидиринг...');
  activeAlpha=null;buildAlpha();render();
}
function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('edit-btn');
  btn.classList.toggle('edit-active',editMode);
  btn.innerHTML=editMode
    ?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg> Yopish`
    :`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Tahrir`;
  document.getElementById('edit-banner').classList.toggle('show',editMode);
  document.getElementById('main').classList.toggle('edit-mode',editMode);
  render();
}

function buildAlpha(){
  const bar=document.getElementById('alpha-bar');
  const letters=lang==='ru'?RU_AL:(script==='lat'?UZ_LAT:UZ_CYR);
  bar.innerHTML='';
  const all=document.createElement('button');
  all.className='alpha-btn'+(activeAlpha?'':' active');
  all.textContent=script==='lat'?'Barchasi':'Барча';
  all.onclick=()=>{activeAlpha=null;buildAlpha();render();};
  bar.appendChild(all);
  const div=document.createElement('div');
  div.className='alpha-divider';
  bar.appendChild(div);
  for(const l of letters){
    const b=document.createElement('button');
    b.className='alpha-btn'+(activeAlpha===l?' active':'');
    b.textContent=l;
    b.onclick=()=>{activeAlpha=l;buildAlpha();render();};
    bar.appendChild(b);
  }
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hl(t,q){if(!q)return esc(t);const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(t).replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>')}
function render(){kbIndex=-1;clearTimeout(timer);timer=setTimeout(_render,80)}


// Get first letter - handles multi-char letters like G' and O'
function firstLetter(word) {
  if (!word) return '?';
  const w = word.toUpperCase();
  // Check two-char Uzbek Latin letters first
  if (w.startsWith("G'") || w.startsWith("Gʻ") || w.startsWith("G‘") || w.startsWith("G’")) return "G'";
  if (w.startsWith("O'") || w.startsWith("Oʻ") || w.startsWith("O‘") || w.startsWith("O’")) return "O'";
  return w.charAt(0);
}
function entryLetter(e) {
  if (lang === 'ru') return (e.ru || '?').charAt(0).toUpperCase();
  return firstLetter(disp(e.word));
}

function isCyrillic(s){ return /[а-яёА-ЯЁ]/.test(s); }
function isRussian(s){ return /[а-яёА-ЯЁ]/.test(s) && !/[ғҳқўҒҲҚЎ]/.test(s); }

// Е/Ё are interchangeable in Russian — normalise both before comparing
function normRu(s){ return (s||'').toLowerCase().replace(/ё/g,'е'); }

// Fuzzy match: returns true if edit distance between a and b is ≤ 1
function editDist1(a,b){
  const la=a.length,lb=b.length;
  if(Math.abs(la-lb)>1)return false;
  if(la===lb){let d=0;for(let i=0;i<la;i++)if(a[i]!==b[i])if(++d>1)return false;return true;}
  const[s,l]=la<lb?[a,b]:[b,a];
  let i=0,j=0,d=0;
  while(i<s.length&&j<l.length){
    if(s[i]!==l[j]){if(++d>1)return false;j++;}else{i++;j++;}
  }
  return true;
}

// Word-type abbreviation badges — lookahead for trailing boundary so consecutive
// abbreviations (e.g. "esk. kt.") are all matched without consuming the space.
const ABBR_RE=/(^|\s)(esk\.|kt\.|dial\.|so&#39;zlashuv\.|bot\.|zool\.|anat\.|tibb\.|farm\.|gram\.|mat\.|fiz\.|kim\.|geo\.|tar\.|muz\.|sp\.|tex\.|iqt\.|haq\.|den\.|qish\.|rvsh\.|zid\.|majoz\.|ko&#39;ch\.)(?=\s|$)/gi;
function badgeify(html){
  return html.replace(ABBR_RE,'$1<span class="wbadge">$2</span>');
}

function buildFiltered(){
  const q=document.getElementById('search').value.trim().toLowerCase();

  if(!q){
    if(activeAlpha){
      return entries.reduce((acc,e,i)=>{
        if(entryLetter({...e,_i:i})===activeAlpha) acc.push({...e,_i:i,_score:0});
        return acc;
      },[]);
    }
    return entries.map((e,i)=>({...e,_i:i,_score:0}));
  }

  const qLat=c2l(q);
  const searchRu = lang==='ru' || isRussian(q);
  const searchUz = !searchRu || lang==='uz';
  // Compute root once for morphological matching
  const root = q.length >= 4 ? stripSuffix(q) : q;
  const rootLat = c2l(root);
  const hasRoot = root !== q && root.length >= 3;

  const qRuNorm=normRu(q); // computed once, not per-entry
  const scored = [];
  entries.forEach((e,i)=>{
    const w=(e._lat||disp(e.word)).toLowerCase();
    const wCyr=e.word.toLowerCase();
    const d=(e._defLat||disp(e.def)).toLowerCase();
    const ru=(e.ru||'').toLowerCase();
    let score=0;

    const ruNorm=normRu(e.ru);
    if(searchRu && ruNorm){
      if(ruNorm.startsWith(qRuNorm)) score=100;
      else if(ruNorm.includes(qRuNorm)) score=60;
    }
    if(searchUz){
      if(w===q||wCyr===q) score=Math.max(score,100);
      else if(w.startsWith(q)||wCyr.startsWith(q)||w.startsWith(qLat)) score=Math.max(score,90);
      else if(w.includes(q)||wCyr.includes(q)||w.includes(qLat)) score=Math.max(score,70);
      else if(d.includes(q)||d.includes(qLat)) score=Math.max(score,30);
      else if(hasRoot&&(w.startsWith(root)||wCyr.startsWith(root)||w.startsWith(rootLat))) score=Math.max(score,20);
      // Fuzzy match: 1-edit-distance on word prefix (typo tolerance)
      else if(q.length>=3&&editDist1(q,w.slice(0,q.length))) score=Math.max(score,15);
    }
    if(score>0) scored.push({...e,_i:i,_score:score});
  });

  scored.sort((a,b)=>b._score-a._score||disp(a.word).localeCompare(disp(b.word),'uz'));

  if(activeAlpha) return scored.filter(e=>entryLetter(e)===activeAlpha);
  return scored;
}

function entryHTML(e,q){
  const i=e._i,w=disp(e.word),d=disp(e.def),ru=e.ru||'';
  const isFav=favs.has(e.word);
  const longDef=d.length>180;
  const expandBtn=longDef?'<div class="expand-hint" id="hint-'+i+'" onclick="event.stopPropagation();expandEntry(event,'+i+')">&#x25be; Ko&#39;proq</div>':'';
  const favClass='fav-btn'+(isFav?' active':'');
  const entryClass='entry'+(e._deleted?' deleted':'');
  const defClass='entry-def'+(longDef?' clipped':' short');
  const ruClass='entry-ru'+(ru?'':' empty');
  let actions='';
  if(e._deleted){
    actions='<button class="act restore" onclick="event.stopPropagation();restoreEntry('+i+')">&#x21a9; Tiklash</button>';
  } else {
    const copyBtn='<button class="act" onclick="event.stopPropagation();copyEntry('+i+')" title="Nusxalash">'
      +'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
      +' Nusxa</button>';
    const editBtns=editMode
      ?'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'ru\')">RU</button>'
        +'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'def\')">Izoh</button>'
        +'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'word\')">So&#39;z</button>'
        +'<button class="act danger" onclick="event.stopPropagation();deleteEntry('+i+')">&#x2715; O&#39;chirish</button>'
      :'';
    actions=copyBtn+editBtns;
  }
  return '<div class="'+entryClass+'" id="entry-'+i+'" onclick="expandEntry(event,'+i+')">'
    +'<div class="entry-left">'
    +'<div class="entry-word" id="word-'+i+'">'+hl(w,lang==='uz'?q:'')+'</div>'
    +'<div class="entry-meta">'
    +'<div class="'+ruClass+'" id="ru-'+i+'">'+(ru?hl(ru,lang==='ru'?q:''): '\u2014')+'</div>'
    +'<button class="'+favClass+'" id="fav-'+i+'" onclick="event.stopPropagation();toggleFav('+i+')" title="Saqlash">\u2605</button>'
    +'<button class="share-btn" onclick="event.stopPropagation();shareEntry('+i+')" title="Ulashish">'+'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>'+'</button>'
    +'</div>'
    +'</div>'
    +'<div>'
    +'<div class="'+defClass+'" id="def-'+i+'">'+badgeify(hl(d,lang==='uz'?q:''))+'</div>'
    +expandBtn
    +'</div>'
    +'<div class="entry-actions">'+actions+'</div>'
    +'<div class="related-words" id="related-'+i+'"></div>'+'<div class="inline-editor" id="ied-'+i+'"></div>'
    +'</div>';
}

function renderPage(filtered,page,q,append){
  const main=document.getElementById('main');
  const start=page*pageSize,end=start+pageSize;
  const slice=filtered.slice(start,end);
  if(!slice.length)return;

  let html='';
  // When searching, show flat list (sorted by score). When browsing, group by letter.
  if(q){
    for(const e of slice) html+=entryHTML(e,q);
  } else {
    const grouped={};
    for(const e of slice){
      const l=entryLetter(e);
      if(!grouped[l])grouped[l]=[];
      grouped[l].push(e);
    }
    for(const letter of Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'uz'))){
      const firstIdx=filtered.findIndex(e=>{
        const l=entryLetter(e);
        return l===letter;
      });
      if(firstIdx>=start&&firstIdx<end){
        html+=`<div class="letter-group" id="lg-${letter}"><div class="letter-head">${esc(letter)}</div>`;
      } else {
        const ex=document.getElementById(`lg-${letter}`);
        if(ex){for(const e of grouped[letter])ex.insertAdjacentHTML('beforeend',entryHTML(e,q));continue;}
        html+=`<div class="letter-group" id="lg-${letter}">`;
      }
      for(const e of grouped[letter])html+=entryHTML(e,q);
      html+='</div>';
    }
  }

  const sentinel=document.getElementById('scroll-sentinel');
  if(sentinel)sentinel.remove();
  if(append)main.insertAdjacentHTML('beforeend',html);
  else main.innerHTML=html;
  if(end<filtered.length){
    main.insertAdjacentHTML('beforeend','<div id="scroll-sentinel" style="height:60px"></div>');
    if(observer)observer.disconnect();
    const s=document.getElementById('scroll-sentinel');
    observer=new IntersectionObserver(es=>{
      if(es[0].isIntersecting){observer.disconnect();renderPage(filtered,page+1,q,true);}
    },{rootMargin:'300px'});
    observer.observe(s);
  }
}

function _render(){
  const main=document.getElementById('main');
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(observer){observer.disconnect();observer=null;}
  filteredCache=buildFiltered();
  const total=filteredCache.length;
  document.getElementById('rc').textContent=total&&q?`${total.toLocaleString()} natija`:'';
  if(q.length>=2) maybeAddHistory(q);
  if(!filteredCache.length){
    main.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><p>Hech narsa topilmadi</p></div>';
    return;
  }
  main.innerHTML='';
  renderPage(filteredCache,0,q,false);
}

function openEditor(i,field){
  document.querySelectorAll('.inline-editor.show').forEach(el=>{if(el.id!==`ied-${i}`)el.classList.remove('show');});
  const box=document.getElementById(`ied-${i}`);
  const e=entries[i];
  const label=field==='ru'?'Rus tarjimasi':field==='def'?'Izoh':'So\'z';
  const val=field==='ru'?(e.ru||''):e[field];
  const isTa=field==='def';
  box.innerHTML=`
    <div class="ie-label">${label}</div>
    ${isTa?`<textarea class="ie-input" id="ie-val-${i}" rows="4">${esc(val)}</textarea>`
           :`<input class="ie-input mono" id="ie-val-${i}" type="text" value="${esc(val)}">`}
    <div class="ie-actions">
      <button class="ie-ok" onclick="saveField(${i},'${field}')">Сақлаш</button>
      <button class="ie-cancel" onclick="closeEditor(${i})">Бекор</button>
    </div>`;
  box.classList.add('show');
  const inp=document.getElementById(`ie-val-${i}`);
  inp.focus();
  if(inp.setSelectionRange)inp.setSelectionRange(inp.value.length,inp.value.length);
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Escape')closeEditor(i);
    if(ev.key==='Enter'&&!isTa)saveField(i,field);
  });
}
function closeEditor(i){const b=document.getElementById(`ied-${i}`);if(b)b.classList.remove('show');}
function saveField(i,field){
  const inp=document.getElementById(`ie-val-${i}`);if(!inp)return;
  const val=inp.value.trim();
  entries[i][field]=val;
  recordPatch(i);closeEditor(i);
  if(field==='ru'){const el=document.getElementById(`ru-${i}`);if(el){el.textContent=val||'—';el.className='entry-ru'+(val?'':' empty');}}
  else if(field==='def'){const el=document.getElementById(`def-${i}`);if(el)el.textContent=val;}
  else if(field==='word'){const el=document.getElementById(`word-${i}`);if(el)el.textContent=disp(val);}
}
function recordPatch(i){
  const e=entries[i];
  patches[e.word]={word:e.word,def:e.def,ru:e.ru||'',_deleted:e._deleted||false};
  changes++;
  document.getElementById('change-count').textContent="" + changes + " o'zgarish";
  const pb=document.getElementById('patch-btn');
  pb.disabled=false;
}
function deleteEntry(i){
  entries[i]._deleted=true;recordPatch(i);
  const el=document.getElementById(`entry-${i}`);
  if(el){el.classList.add('deleted');const a=el.querySelector('.entry-actions');if(a)a.innerHTML=`<button class="act restore" onclick="restoreEntry(${i})">↩ Tiklash</button>`;}
}
function restoreEntry(i){entries[i]._deleted=false;recordPatch(i);render();}

function exportPatch(){
  const list=Object.values(patches);
  if(!list.length){alert('Ўзгаришлар йўқ.');return;}
  dl(JSON.stringify({created:new Date().toISOString(),count:list.length,patches:list},null,2),`lugat_patch_${new Date().toISOString().slice(0,10)}.json`);
}
function exportJSON(){
  dl(JSON.stringify(entries.filter(e=>!e._deleted).map(e=>({word:e.word,def:e.def,ru:e.ru||''})),null,2),'dictionary_enriched.json');
}
function dl(content,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'application/json'}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}

async function load(){
  try{
    let resp=await fetch('dictionary_enriched.json');
    if(!resp.ok)resp=await fetch('dictionary_parsed.json');
    const raw=await resp.json();
    entries=Array.isArray(raw)?raw:Object.values(raw);
    entries.forEach(e=>{e._lat=c2l(e.word);e._defLat=c2l(e.def);});
    document.getElementById('h-count').textContent=entries.length.toLocaleString()+" so'z";
    const _hasRu=entries.some(e=>e.ru);
    document.getElementById('btn-ru').disabled=!_hasRu;
    const _bruM=document.getElementById('btn-ru-m');if(_bruM)_bruM.disabled=!_hasRu;
    loadPrefs();
    loadFavs();
    buildAlpha();
    applyURL();
    if(!document.getElementById('search').value) requestAnimationFrame(()=>requestAnimationFrame(render));
  }catch(err){
    const status=document.getElementById('status');
    status.classList.add('show');
    document.getElementById('status-txt').textContent='Xato: '+err.message;

}

const PREFS_KEY = 'lugat_prefs';

function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem(PREFS_KEY)) || {};
    setTheme(p.theme || 'system', true);
    setSize(p.size || 'md', true);
    setDensity(p.density || 'normal', true);
  } catch(e) { }
}

function savePrefs() {
  try {
    const p = {
      theme: document.documentElement.dataset.themeChoice || 'system',
      size: document.documentElement.dataset.size || 'md',
      density: document.documentElement.dataset.density || 'normal'
    };
    localStorage.setItem(PREFS_KEY, JSON.stringify(p));
  } catch(e) { }
}

function setTheme(t, silent) {
  document.documentElement.dataset.themeChoice = t;
  const isDark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  ['light','dark','system'].forEach(x => {
    const el = document.getElementById(`theme-${x}`);
    if (el) el.classList.toggle('active', x === t);
  });
  if (!silent) savePrefs();
}

function setSize(s, silent) {
  document.documentElement.dataset.size = s;
  ['sm','md','lg'].forEach(x => {
    const el = document.getElementById(`size-${x}`);
    if (el) el.classList.toggle('active', x === s);
  });
  if (!silent) savePrefs();
}

function setDensity(d, silent) {
  document.documentElement.dataset.density = d;
  ['compact','normal','comfortable'].forEach(x => {
    const el = document.getElementById(`density-${x}`);
    if (el) el.classList.toggle('active', x === d);
  });
  if (!silent) savePrefs();
}

// ── SEARCH HISTORY ──────────────────────────────────────────────
const HISTORY_KEY = 'lugat_history';
const MAX_HISTORY = 10;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch(e) { return []; }
}
function addHistory(q) {
  if (!q || q.length < 2) return;
  let h = getHistory().filter(x => x !== q);
  h.unshift(q);
  h = h.slice(0, MAX_HISTORY);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch(e) {}
}
function clearHistory() {
  try { localStorage.removeItem(HISTORY_KEY); } catch(e) {}
  hideDropdown();
}

function showDropdown() {
  const h = getHistory();
  const dd = document.getElementById('search-dropdown');
  if (!h.length) { hideDropdown(); return; }
  dd.innerHTML = `<div class="sd-label">So'nggi qidiruvlar</div>` +
    h.map(q => `<div class="sd-item" onclick="pickHistory('${esc(q)}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${esc(q)}
    </div>`).join('') +
    `<div class="sd-clear" onclick="clearHistory()">Tarixni tozalash</div>`;
  dd.classList.add('show');
}
function hideDropdown() {
  document.getElementById('search-dropdown').classList.remove('show');
}
function pickHistory(q) {
  const inp = document.getElementById('search');
  inp.value = q;
  hideDropdown();
  inp.focus();
  onSearchInput();
}

// ── URL SYNC ─────────────────────────────────────────────────────
function pushURL(q, word) {
  const params = new URLSearchParams();
  if (word) params.set('word', word);
  else if (q) params.set('q', q);
  const url = params.toString() ? `?${params}` : location.pathname;
  history.pushState({ q, word }, '', url);
}

function readURL() {
  const params = new URLSearchParams(location.search);
  return { q: params.get('q') || '', word: params.get('word') || '' };
}

function applyURL() {
  const { q, word } = readURL();
  const inp = document.getElementById('search');
  if (word) {
    inp.value = word;
    render();
    // after render, scroll to the word
    setTimeout(() => {
      const entry = entries.find(e => e.word === word);
      if (entry) {
        const idx = entries.indexOf(entry);
        const el = document.getElementById(`entry-${idx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 300);
  } else if (q) {
    inp.value = q;
    render();
  }
}

window.addEventListener('popstate', () => {
  const { q, word } = readURL();
  const inp = document.getElementById('search');
  inp.value = word || q || '';
  render();
});

// ── MORPHOLOGICAL SEARCH ─────────────────────────────────────────
// Common Uzbek suffixes to strip for root matching
const UZ_SUFFIXES = [
  'larning','larga','lardan','larda','larni','lar',
  'ning','ndan','nga','nda','ni','dan','da','ga','ni',
  'lik','lik','chi','chilik','siz','sizlik','li','lamoq',
  'moq','ish','ish','uvchi','adigan','ydigan','digan',
  'gan','kan','qan','ayotgan','yotgan','otgan',
  'adi','ydi','di','di','ibdi','ipti',
  'aman','yman','san','ysan','miz','ymiz','siz','ysiz',
  'imiz','ingiz','ingizni','ingizga','ingizdan',
  'im','ing','i','imni','ingni',
  'roq','gina','kina','qina','oq','yoq',
  'lab','lashib','lashmoq','lashtirmoq',
];

function stripSuffix(word) {
  const w = word.toLowerCase();
  for (const sfx of UZ_SUFFIXES) {
    if (w.endsWith(sfx) && w.length - sfx.length >= 3) {
      return w.slice(0, w.length - sfx.length);
    }
  }
  return w;
}

// ── SEARCH SUGGESTIONS ───────────────────────────────────────────
function showSuggestions(q) {
  const dd = document.getElementById('search-dropdown');
  if (!q || q.length < 2) { hideSuggestions(); return; }

  const ql = c2l(q);
  const root = stripSuffix(q);
  const suggestions = [];
  const seen = new Set();

  for (const e of entries) {
    if (suggestions.length >= 7) break;
    const w = disp(e.word).toLowerCase();
    const wc = e.word.toLowerCase();
    if ((w.startsWith(q) || wc.startsWith(q) || w.startsWith(ql)) && !seen.has(e.word)) {
      suggestions.push(e);
      seen.add(e.word);
    }
  }
  // Also add morphological matches
  if (suggestions.length < 7 && root !== q) {
    for (const e of entries) {
      if (suggestions.length >= 7) break;
      const w = disp(e.word).toLowerCase();
      if (w.startsWith(root) && !seen.has(e.word)) {
        suggestions.push(e);
        seen.add(e.word);
      }
    }
  }

  if (!suggestions.length) { hideSuggestions(); return; }

  dd.innerHTML = suggestions.map(e => {
    const w = disp(e.word);
    const ru = e.ru || '';
    return `<div class="suggestion-item" onclick="pickSuggestion('${esc(e.word)}')">
      <span class="suggestion-word">${esc(w)}</span>
      ${ru ? `<span class="suggestion-ru">${esc(ru)}</span>` : ''}
    </div>`;
  }).join('');

  dd.classList.add('show');
}

function hideSuggestions() {
  document.getElementById('search-dropdown').classList.remove('show');
}

function pickSuggestion(word) {
  const inp = document.getElementById('search');
  inp.value = disp(word);
  hideSuggestions();
  render();
  pushURL(inp.value, '');
  addHistory(inp.value);
}

// ── RELATED WORDS ────────────────────────────────────────────────
function getRelated(word, idx) {
  const w = disp(word).toLowerCase();
  const prefix = w.slice(0, Math.max(4, Math.floor(w.length * 0.6)));
  const related = [];
  for (const e of entries) {
    if (e.word === word) continue;
    if (related.length >= 8) break;
    const ew = disp(e.word).toLowerCase();
    if (ew.startsWith(prefix) && ew !== w) related.push(e);
  }
  return related;
}

// Patch expandEntry to show related words
// expandEntry enhanced below
function expandEntry(event, i) {
  if (event.target.closest('.entry-actions') || event.target.closest('.inline-editor') || event.target.closest('.fav-btn')) return;
  const el = document.getElementById(`entry-${i}`);
  if (!el) return;
  const isExpanded = el.classList.contains('expanded');
  el.classList.toggle('expanded', !isExpanded);
  const hint = document.getElementById(`hint-${i}`);
  if (hint) hint.textContent = isExpanded ? '▾ Ko\'proq' : 'Yopish ↑';

  if (!isExpanded) {
    // Add to recent words
    addRecent(entries[i].word);
    // Show related words
    const relDiv = document.getElementById(`related-${i}`);
    if (relDiv && !relDiv.dataset.loaded) {
      const related = getRelated(entries[i].word, i);
      if (related.length) {
        relDiv.innerHTML = `<div class="related-label">Tegishli so'zlar</div>
          <div class="related-list">${related.map(r =>
            `<button class="related-chip" onclick="searchWord('${esc(r.word)}')">${esc(disp(r.word))}</button>`
          ).join('')}</div>`;
      } else {
        relDiv.style.display = 'none';
      }
      relDiv.dataset.loaded = '1';
    }
  }
}

function searchWord(word) {
  const inp = document.getElementById('search');
  inp.value = disp(word);
  hideSuggestions();
  render();
  pushURL(inp.value, '');
}

// ── SHARE ────────────────────────────────────────────────────────
function shareEntry(i) {
  const e = entries[i];
  const word = e.word;
  const url = location.origin + location.pathname + '?word=' + encodeURIComponent(word);
  const text = disp(word) + (e.ru ? ' — ' + e.ru : '') + '\n' + disp(e.def).slice(0, 200);

  if (navigator.share) {
    navigator.share({ title: disp(word), text, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Havola nusxalandi ✓'));
  }
}

const RECENT_KEY = 'lugat_recent';
const MAX_RECENT = 20;

function getRecent() {

// ── KEYBOARD NAVIGATION ──────────────────────────────────────────
let kbIndex = -1;

function getVisibleEntries() {
  return Array.from(document.querySelectorAll('.entry[id^="entry-"]'));
}

function kbMove(dir) {
  const els = getVisibleEntries();
  if (!els.length) return;
  els[kbIndex]?.classList.remove('kb-focus');
  kbIndex = Math.max(0, Math.min(els.length - 1, kbIndex + dir));
  const el = els[kbIndex];
  el.classList.add('kb-focus');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function kbSelect() {
  const els = getVisibleEntries();
  if (kbIndex >= 0 && kbIndex < els.length) {
    const el = els[kbIndex];
    const i = parseInt(el.id.replace('entry-', ''));
    expandEntry({ target: el, stopPropagation: () => {} }, i);
  }
}

document.addEventListener('keydown', e => {
  const inp = document.getElementById('search');
  const inSearch = document.activeElement === inp;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (inSearch) { inp.blur(); kbIndex = -1; }
    kbMove(1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    kbMove(-1);
  } else if (e.key === 'Enter' && !inSearch) {
    e.preventDefault();
    kbSelect();
  }
});
