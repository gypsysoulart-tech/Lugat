<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'zbek lug'ati</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Apple system font stack */
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "JetBrains Mono", ui-monospace, monospace;

  /* Light mode — Apple semantic colors */
  --bg:           #f2f2f7;
  --bg2:          #ffffff;
  --bg3:          #f2f2f7;
  --surface:      rgba(255,255,255,0.85);
  --surface-solid:#ffffff;
  --surface2:     rgba(118,118,128,0.12);
  --surface3:     rgba(118,118,128,0.20);
  --text:         #000000;
  --text2:        rgba(60,60,67,0.85);
  --text3:        rgba(60,60,67,0.50);
  --text4:        rgba(60,60,67,0.30);
  --separator:    rgba(60,60,67,0.20);
  --separator2:   rgba(60,60,67,0.12);

  /* Apple tints */
  --blue:        #007AFF;
  --blue-light:  rgba(0,122,255,0.12);
  --blue-text:   #0055D4;
  --green:       #34C759;
  --green-light: rgba(52,199,89,0.12);
  --orange:      #FF9500;
  --orange-light:rgba(255,149,0,0.12);
  --red:         #FF3B30;
  --red-light:   rgba(255,59,48,0.12);
  --yellow:      #FFCC00;
  --yellow-light:rgba(255,204,0,0.18);
  --purple:      #AF52DE;
  --teal:        #5AC8FA;
  --indigo:      #5856D6;

  /* Radii — Apple loves big rounded corners */
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  20px;
  --r-2xl: 28px;

  /* Shadows */
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.08);

  /* Spacing */
  --font-size-word: 15px;
  --font-size-def:  14px;
  --font-size-ru:   13px;
  --entry-padding:  14px;
}

[data-theme="dark"] {
  --bg:           #000000;
  --bg2:          #1c1c1e;
  --bg3:          #2c2c2e;
  --surface:      rgba(28,28,30,0.85);
  --surface-solid:#1c1c1e;
  --surface2:     rgba(118,118,128,0.22);
  --surface3:     rgba(118,118,128,0.32);
  --text:         #ffffff;
  --text2:        rgba(235,235,245,0.85);
  --text3:        rgba(235,235,245,0.50);
  --text4:        rgba(235,235,245,0.25);
  --separator:    rgba(84,84,88,0.65);
  --separator2:   rgba(84,84,88,0.35);
  --blue:         #0A84FF;
  --blue-light:   rgba(10,132,255,0.20);
  --blue-text:    #409CFF;
  --green:        #30D158;
  --green-light:  rgba(48,209,88,0.20);
  --orange:       #FF9F0A;
  --orange-light: rgba(255,159,10,0.20);
  --red:          #FF453A;
  --red-light:    rgba(255,69,58,0.20);
  --yellow:       #FFD60A;
  --yellow-light: rgba(255,214,10,0.22);
  --shadow-sm:  0 1px 3px rgba(0,0,0,.4);
  --shadow-md:  0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.6);
}

[data-size="sm"] { --font-size-word:13px; --font-size-def:12px; --font-size-ru:11px; --entry-padding:10px; }
[data-size="md"] { --font-size-word:15px; --font-size-def:14px; --font-size-ru:13px; --entry-padding:14px; }
[data-size="lg"] { --font-size-word:17px; --font-size-def:16px; --font-size-ru:14px; --entry-padding:18px; }
[data-density="compact"]     { --entry-padding:8px; }
[data-density="normal"]      { --entry-padding:14px; }
[data-density="comfortable"] { --entry-padding:20px; }

html { background: var(--bg); }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.47;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; min-height: 100dvh; }

/* ── TOPBAR ── */
.topbar {
  height: 52px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--surface);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--separator2);
}

.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-icon {
  width: 32px; height: 32px;
  background: var(--blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  color: #fff;
  letter-spacing: -.3px;
  flex-shrink: 0;
  font-family: var(--font);
}
.brand-name {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.3px;
  color: var(--text);
}
.brand-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 20px;
}

.topbar-right { display: flex; align-items: center; gap: 8px; }

/* Segmented control — Apple style */
.seg {
  display: flex;
  background: var(--surface2);
  border-radius: 9px;
  padding: 2px;
  gap: 0;
}
.seg button {
  height: 28px;
  padding: 0 12px;
  border: none;
  background: transparent;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font);
  letter-spacing: -.1px;
  white-space: nowrap;
}
.seg button.active {
  background: var(--surface-solid);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.seg button:disabled { opacity:.35; cursor:default; }

.icon-btn {
  height: 32px;
  padding: 0 12px;
  border: none;
  background: var(--surface2);
  border-radius: 8px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all .15s;
  font-family: var(--font);
  white-space: nowrap;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); }
.icon-btn.edit-active { background: var(--orange-light); color: var(--orange); }

.fav-topbtn {
  height: 32px;
  padding: 0 12px;
  border: none;
  background: var(--surface2);
  border-radius: 8px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all .15s;
  font-family: var(--font);
}
.fav-topbtn:hover { background: var(--yellow-light); color: var(--orange); }
.fav-count {
  background: var(--orange);
  color: #fff;
  border-radius: 10px;
  padding: 0 6px;
  font-size: 11px;
  font-weight: 600;
  display: none;
}
.fav-count.show { display: inline; }

/* ── SEARCH BAR ── */
.searchbar {
  padding: 10px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--surface);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--separator2);
  position: sticky;
  top: 52px;
  z-index: 190;
}
.search-wrap {
  flex: 1;
  min-width: 0;
  max-width: 600px;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}
#search {
  width: 100%;
  height: 36px;
  padding: 0 36px;
  border: none;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  transition: background .15s, box-shadow .15s;
  -webkit-appearance: none;
}
#search:focus {
  background: var(--surface-solid);
  box-shadow: 0 0 0 3px var(--blue-light), var(--shadow-sm);
}
#search::placeholder { color: var(--text3); }
#search::-webkit-search-cancel-button { -webkit-appearance: none; }
.result-badge {
  font-size: 13px;
  color: var(--text3);
  font-weight: 500;
  white-space: nowrap;
}

/* Search dropdown */
.search-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--surface-solid);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  z-index: 300;
  overflow: hidden;
  border: 0.5px solid var(--separator2);
}
.search-dropdown.show { display: block; }
.sd-label {
  padding: 10px 14px 5px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--text3);
}
.sd-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  transition: background .08s;
}
.sd-item:hover { background: var(--surface2); }
.sd-item svg { color: var(--text4); flex-shrink: 0; }
.sd-clear {
  padding: 8px 14px;
  border-top: 0.5px solid var(--separator2);
  font-size: 12px;
  color: var(--red);
  cursor: pointer;
  text-align: center;
  transition: background .08s;
}
.sd-clear:hover { background: var(--red-light); }

/* ── ALPHA BAR ── */
.alphabar {
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
  height: 40px;
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 0.5px solid var(--separator2);
}
.alphabar::-webkit-scrollbar { display: none; }
.alpha-btn {
  height: 28px;
  min-width: 28px;
  padding: 0 6px;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--blue);
  cursor: pointer;
  transition: all .12s;
  font-family: var(--font-mono);
  white-space: nowrap;
  flex-shrink: 0;
}
.alpha-btn:hover { background: var(--blue-light); }
.alpha-btn.active { background: var(--blue); color: #fff; }
.alpha-divider { width: 0.5px; height: 14px; background: var(--separator2); margin: 0 2px; flex-shrink: 0; }

/* ── EDIT BANNER ── */
.edit-banner {
  display: none;
  padding: 10px 20px;
  background: var(--orange-light);
  border-bottom: 0.5px solid rgba(255,149,0,.3);
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
  color: var(--orange);
}
.edit-banner.show { display: flex; }
.edit-banner strong { font-weight: 600; }
.banner-btns { display: flex; gap: 8px; align-items: center; }
.banner-btn {
  height: 30px;
  padding: 0 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: opacity .12s;
}
.banner-btn:hover { opacity: .85; }
.banner-btn.primary { background: var(--orange); color: #fff; }
.banner-btn.secondary { background: var(--surface2); color: var(--orange); }
.banner-btn:disabled { opacity: .35; cursor: default; }

/* ── STATUS BAR ── */
.status-bar {
  display: none;
  padding: 10px 20px;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text3);
  background: var(--bg2);
}
.status-bar.show { display: flex; }
.progress-track { flex: 1; max-width: 180px; height: 3px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--blue); border-radius: 10px; transition: width .2s; width: 0; }

/* ── MAIN ── */
#main {
  max-width: 820px;
  margin: 0 auto;
  width: 100%;
  padding: 8px 20px 100px;
  flex: 1;
}

/* ── LETTER GROUP ── */
.letter-group { margin-top: 24px; }
.letter-head {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text3);
  font-family: var(--font-mono);
  padding-bottom: 8px;
  border-bottom: 0.5px solid var(--separator2);
}

/* ── ENTRY ── */
.entry {
  display: grid;
  grid-template-columns: 200px 1fr;
  border-bottom: 0.5px solid var(--separator2);
  padding: var(--entry-padding) 0;
  gap: 0;
  cursor: pointer;
  transition: background .1s;
  border-radius: 0;
  position: relative;
}
.entry:last-child { border-bottom: none; }
.entry:active { background: var(--surface2); }
.entry.expanded {
  background: var(--surface2);
  margin: 0 -12px;
  padding: var(--entry-padding) 12px;
  border-radius: var(--r-md);
  border-bottom: none;
}
.entry.deleted { opacity: .3; }
.entry.deleted .entry-word { text-decoration: line-through; }

.entry-left { padding-right: 16px; }

.entry-word {
  font-size: var(--font-size-word);
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -.2px;
  font-family: var(--font-mono);
}
.entry-ru {
  font-size: var(--font-size-ru);
  color: var(--blue);
  margin-top: 4px;
  font-weight: 400;
  letter-spacing: -.1px;
}
.entry-ru.empty { color: var(--text4); }
.entry-def {
  font-size: var(--font-size-def);
  color: var(--text2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.entry.expanded .entry-def { -webkit-line-clamp: unset; overflow: visible; }
.entry-def.short { display: block; overflow: visible; }
.expand-hint {
  display: none;
  margin-top: 4px;
  font-size: 12px;
  color: var(--blue);
  font-weight: 500;
}
.entry:not(.expanded) .entry-def.clipped ~ .expand-hint { display: block; }

/* ── ENTRY ACTIONS ── */
.entry-actions {
  display: none;
  position: absolute;
  top: 10px; right: 0;
  flex-direction: column;
  gap: 4px;
}
.entry:hover .entry-actions,
.edit-mode .entry-actions { display: flex; }

.act {
  height: 26px;
  padding: 0 10px;
  border: none;
  border-radius: 7px;
  background: var(--surface-solid);
  color: var(--blue);
  font-size: 12px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  transition: all .1s;
}
.act:hover { background: var(--blue-light); }
.act.danger { color: var(--red); }
.act.danger:hover { background: var(--red-light); }
.act.restore { color: var(--green); }
.act.restore:hover { background: var(--green-light); }

/* ── INLINE EDITOR ── */
.inline-editor {
  display: none;
  grid-column: 1 / -1;
  margin-top: 10px;
  background: var(--bg2);
  border-radius: var(--r-md);
  padding: 14px;
  box-shadow: var(--shadow-md);
}
.inline-editor.show { display: block; }
.ie-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.ie-input {
  width: 100%;
  font-size: 14px;
  font-family: var(--font);
  padding: 9px 12px;
  border: none;
  border-radius: var(--r-sm);
  color: var(--text);
  background: var(--surface2);
  outline: none;
  resize: vertical;
  line-height: 1.5;
  transition: box-shadow .15s;
}
.ie-input:focus { box-shadow: 0 0 0 3px var(--blue-light); }
.ie-input.mono { font-family: var(--font-mono); }
.ie-actions { display: flex; gap: 8px; margin-top: 10px; }
.ie-ok {
  height: 32px; padding: 0 18px;
  background: var(--blue); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-size: 13px; font-family: var(--font); font-weight: 600;
  cursor: pointer;
  transition: opacity .12s;
}
.ie-ok:hover { opacity: .85; }
.ie-cancel {
  height: 32px; padding: 0 14px;
  background: var(--surface2); color: var(--text2);
  border: none; border-radius: var(--r-sm);
  font-size: 13px; font-family: var(--font); font-weight: 500;
  cursor: pointer;
}
.ie-cancel:hover { background: var(--surface3); }

/* ── HIGHLIGHT ── */
mark { background: var(--yellow-light); color: var(--text); border-radius: 3px; padding: 1px 2px; }

/* ── COPY TOAST ── */
.copy-toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: rgba(0,0,0,.8);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  z-index: 1000;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  pointer-events: none;
  white-space: nowrap;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  opacity: 0;
}
.copy-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── FAV BUTTON IN ENTRY ── */
.fav-btn {
  background: none; border: none;
  cursor: pointer; padding: 2px;
  color: var(--text4);
  font-size: 15px; line-height: 1;
  transition: color .15s, transform .2s;
  flex-shrink: 0;
}
.fav-btn:hover { color: var(--orange); transform: scale(1.2); }
.fav-btn.active { color: var(--orange); }

/* ── SETTINGS PANEL ── */
.settings-panel {
  display: none;
  position: fixed;
  top: 60px; right: 16px;
  width: 280px;
  background: var(--surface-solid);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-lg);
  z-index: 400;
  padding: 16px;
  border: 0.5px solid var(--separator2);
}
.settings-panel.open { display: block; }
.settings-section { margin-bottom: 18px; }
.settings-section:last-child { margin-bottom: 0; }
.settings-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
  display: block;
}
.settings-row { display: flex; gap: 6px; }
.settings-btn {
  flex: 1;
  height: 34px;
  border: none;
  border-radius: var(--r-sm);
  background: var(--surface2);
  color: var(--text2);
  font-size: 13px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  transition: all .12s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.settings-btn:hover { background: var(--surface3); color: var(--text); }
.settings-btn.active { background: var(--blue); color: #fff; }

/* ── FAV PANEL ── */
.fav-panel {
  display: none;
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 340px;
  background: var(--surface-solid);
  border-left: 0.5px solid var(--separator2);
  z-index: 500;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
}
.fav-panel.open { display: flex; }
.fav-header {
  padding: 16px 20px;
  border-bottom: 0.5px solid var(--separator2);
  display: flex; align-items: center; justify-content: space-between;
}
.fav-header h2 { font-size: 17px; font-weight: 600; letter-spacing: -.2px; }
.fav-close {
  width: 30px; height: 30px;
  border: none;
  border-radius: 50%;
  background: var(--surface2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 14px;
  transition: background .12s;
}
.fav-close:hover { background: var(--surface3); }
.fav-list { flex: 1; overflow-y: auto; }
.fav-entry {
  padding: 12px 20px;
  border-bottom: 0.5px solid var(--separator2);
  cursor: pointer;
  transition: background .08s;
}
.fav-entry:hover { background: var(--surface2); }
.fav-entry-word { font-size: 14px; font-weight: 600; font-family: var(--font-mono); letter-spacing: -.2px; }
.fav-entry-ru { font-size: 12px; color: var(--blue); margin-top: 2px; }
.fav-empty { padding: 48px 20px; text-align: center; color: var(--text3); font-size: 14px; line-height: 1.6; }
.fav-footer {
  padding: 14px 20px;
  border-top: 0.5px solid var(--separator2);
  font-size: 13px;
  color: var(--text3);
  display: flex; justify-content: space-between; align-items: center;
}
.fav-clear { font-size: 13px; color: var(--red); cursor: pointer; background: none; border: none; font-family: var(--font); font-weight: 500; }

<script>
const CYR_MAP=[['Ё','Yo'],['ё','yo'],['Ю','Yu'],['ю','yu'],['Я','Ya'],['я','ya'],['Ж','J'],['ж','j'],['Х','X'],['х','x'],['Ц','Ts'],['ц','ts'],['Ч','Ch'],['ч','ch'],['Ш','Sh'],['ш','sh'],['Щ','Sh'],['щ','sh'],['Ъ',"'"],['ъ',"'"],['Ь',''],['ь',''],['А','A'],['а','a'],['Б','B'],['б','b'],['В','V'],['в','v'],['Г','G'],['г','g'],['Д','D'],['д','d'],['Е','E'],['е','e'],['З','Z'],['з','z'],['И','I'],['и','i'],['Й','Y'],['й','y'],['К','K'],['к','k'],['Л','L'],['л','l'],['М','M'],['м','m'],['Н','N'],['н','n'],['О','O'],['о','o'],['П','P'],['п','p'],['Р','R'],['р','r'],['С','S'],['с','s'],['Т','T'],['т','t'],['У','U'],['у','u'],['Ф','F'],['ф','f'],['Э','E'],['э','e'],['Ғ',"G'"],['ғ',"g'"],['Ҳ','H'],['ҳ','h'],['Қ','Q'],['қ','q'],['Ў',"O'"],['ў',"o'"]];
const UZ_CYR=['А','Б','В','Г','Д','Е','Ж','З','И','Й','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ч','Ш','Э','Ю','Я','Ғ','Қ','Ҳ','Ў'];
const UZ_LAT=['A','B','D','E','F','G',"G'",'H','I','J','K','L','M','N','O',"O'",'P','Q','R','S','T','U','V','X','Y','Z'];
const RU_AL=['А','Б','В','Г','Д','Е','Ж','З','И','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ц','Ч','Ш','Э','Ю','Я'];

let entries=[], script='lat', lang='uz', activeAlpha=null, editMode=false, changes=0, timer=null;
let filteredCache=[], pageSize=100, observer=null;
const patches={};

function c2l(s){let r=s;for(const[c,l]of CYR_MAP)r=r.split(c).join(l);return r}
function disp(s){return script==='lat'?c2l(s||''):(s||'')}

// Cyrillic → Latin letter equivalents
const CYR_TO_LAT_LETTER = {
  'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ж':'J','З':'Z',
  'И':'I','Й':'Y','К':'K','Л':'L','М':'M','Н':'N','О':'O','П':'P',
  'Р':'R','С':'S','Т':'T','У':'U','Ф':'F','Х':'X','Ч':'Ch','Ш':'Sh',
  'Э':'E','Ю':'Yu','Я':'Ya','Ғ':"G'",'Қ':'Q','Ҳ':'H','Ў':"O'"
};
const LAT_TO_CYR_LETTER = {
  'A':'А','B':'Б','D':'Д','E':'Э','F':'Ф','G':'Г',"G'":'Ғ','H':'Ҳ',
  'I':'И','J':'Ж','K':'К','L':'Л','M':'М','N':'Н','O':'О',"O'":'Ў',
  'P':'П','Q':'Қ','R':'Р','S':'С','T':'Т','U':'У','V':'В','X':'Х',
  'Y':'Й','Z':'З'
};

function setScript(s){
  if(activeAlpha){
    const mapped = s==='lat' ? CYR_TO_LAT_LETTER[activeAlpha] : LAT_TO_CYR_LETTER[activeAlpha];
    activeAlpha = mapped || null;
  }
  script=s;
  ['script-seg','script-seg-m'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',(i===0&&s==='lat')||(i===1&&s==='cyr')));
  });
  document.getElementById('search').placeholder=lang==='ru'?'Поиск на русском...':(s==='lat'?"So'z qidiring...":'Сўз қидиринг...');
  buildAlpha();render();
}
function setLang(l){
  lang=l;
  ['lang-seg','lang-seg-m'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='uz')||(i===1&&l==='ru')));
  });
  document.getElementById('search').placeholder=l==='ru'?'Поиск на русском...':(script==='lat'?"So'z qidiring...":'Сўз қидиринг...');
  activeAlpha=null;buildAlpha();render();
}
function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('edit-btn');
  btn.classList.toggle('edit-active',editMode);
  btn.innerHTML=editMode
    ?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg> Yopish`
    :`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Tahrir`;
  document.getElementById('edit-banner').classList.toggle('show',editMode);
  document.getElementById('main').classList.toggle('edit-mode',editMode);
  render();
}

function buildAlpha(){
  const bar=document.getElementById('alpha-bar');
  const letters=lang==='ru'?RU_AL:(script==='lat'?UZ_LAT:UZ_CYR);
  bar.innerHTML='';
  const all=document.createElement('button');
  all.className='alpha-btn'+(activeAlpha?'':' active');
  all.textContent=script==='lat'?'Barchasi':'Барча';
  all.onclick=()=>{activeAlpha=null;buildAlpha();render();};
  bar.appendChild(all);
  const div=document.createElement('div');
  div.className='alpha-divider';
  bar.appendChild(div);
  for(const l of letters){
    const b=document.createElement('button');
    b.className='alpha-btn'+(activeAlpha===l?' active':'');
    b.textContent=l;
    b.onclick=()=>{activeAlpha=l;buildAlpha();render();};
    bar.appendChild(b);
  }
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hl(t,q){if(!q)return esc(t);const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(t).replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>')}
function render(){clearTimeout(timer);timer=setTimeout(_render,80)}


// Get first letter - handles multi-char letters like G' and O'
function firstLetter(word) {
  if (!word) return '?';
  const w = word.toUpperCase();
  // Check two-char Uzbek Latin letters first
  if (w.startsWith("G'") || w.startsWith("Gʻ") || w.startsWith("G‘") || w.startsWith("G’")) return "G'";
  if (w.startsWith("O'") || w.startsWith("Oʻ") || w.startsWith("O‘") || w.startsWith("O’")) return "O'";
  return w.charAt(0);
}
function entryLetter(e) {
  if (lang === 'ru') return (e.ru || '?').charAt(0).toUpperCase();
  return firstLetter(disp(e.word));
}

function isCyrillic(s){ return /[а-яёА-ЯЁ]/.test(s); }
function isRussian(s){ return /[а-яёА-ЯЁ]/.test(s) && !/[ғҳқўҒҲҚЎ]/.test(s); }

function buildFiltered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(!q) return entries.map((e,i)=>({...e,_i:i,_score:0}));

  const qLat=c2l(q);
  // Auto-detect Russian: if query has Cyrillic but no Uzbek-specific letters
  const searchRu = lang==='ru' || isRussian(q);
  const searchUz = !searchRu || lang==='uz';

  const scored = [];
  entries.forEach((e,i)=>{
    const w=disp(e.word).toLowerCase();
    const wCyr=e.word.toLowerCase();
    const d=disp(e.def).toLowerCase();
    const ru=(e.ru||'').toLowerCase();
    let score=0;

    if(searchRu && ru){
      if(ru.startsWith(q)) score=100;
      else if(ru.includes(q)) score=60;
    }
    if(searchUz){
      if(w===q||wCyr===q) score=Math.max(score,100);
      else if(w.startsWith(q)||wCyr.startsWith(q)||w.startsWith(qLat)) score=Math.max(score,90);
      else if(w.includes(q)||wCyr.includes(q)||w.includes(qLat)) score=Math.max(score,70);
      else if(d.includes(q)||d.includes(qLat)) score=Math.max(score,30);
    }
    if(score>0) scored.push({...e,_i:i,_score:score});
  });

  // Sort by score descending, then alphabetically
  scored.sort((a,b)=>b._score-a._score||disp(a.word).localeCompare(disp(b.word),'uz'));

  // Alpha filter applied after scoring
  if(activeAlpha){
    return scored.filter(e=>{
      const src=entryLetter(e);
      return src===activeAlpha;
    });
  }
  return scored;
}

function entryHTML(e,q){
  const i=e._i,w=disp(e.word),d=disp(e.def),ru=e.ru||'';
  const isFav=favs.has(e.word);
  const longDef=d.length>180;
  const expandBtn=longDef?'<div class="expand-hint" id="hint-'+i+'" onclick="event.stopPropagation();expandEntry(event,'+i+')">&#x25be; Ko&#39;proq</div>':'';
  const favClass='fav-btn'+(isFav?' active':'');
  const entryClass='entry'+(e._deleted?' deleted':'');
  const defClass='entry-def'+(longDef?' clipped':' short');
  const ruClass='entry-ru'+(ru?'':' empty');
  let actions='';
  if(e._deleted){
    actions='<button class="act restore" onclick="event.stopPropagation();restoreEntry('+i+')">&#x21a9; Tiklash</button>';
  } else if(editMode){
    actions='<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'ru\')">RU</button>'
      +'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'def\')">Izoh</button>'
      +'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'word\')">So&#39;z</button>'
      +'<button class="act danger" onclick="event.stopPropagation();deleteEntry('+i+')">&#x2715;</button>';
  }
  actions='<button class="act" onclick="event.stopPropagation();copyEntry('+i+')" title="Nusxalash">'
    +'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
    +' Nusxa</button>'+(editMode?'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'ru\')">RU</button>'
      +'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'def\')">Izoh</button>'
      +'<button class="act" onclick="event.stopPropagation();openEditor('+i+',\'word\')">So&#39;z</button>'
      +'<button class="act danger" onclick="event.stopPropagation();deleteEntry('+i+')">&#x2715;</button>':'');
  if(e._deleted) actions='<button class="act restore" onclick="event.stopPropagation();restoreEntry('+i+')">&#x21a9; Tiklash</button>';
  return '<div class="'+entryClass+'" id="entry-'+i+'" onclick="expandEntry(event,'+i+')">'
    +'<div class="entry-left">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div class="entry-word" id="word-'+i+'">'+hl(w,lang==='uz'?q:'')+'</div>'
    +'<button class="'+favClass+'" id="fav-'+i+'" onclick="event.stopPropagation();toggleFav('+i+')" title="Saqlash">\u2605</button>'
    +'</div>'
    +'<div class="'+ruClass+'" id="ru-'+i+'">'+(ru?hl(ru,lang==='ru'?q:''): '\u2014')+'</div>'
    +'</div>'
    +'<div>'
    +'<div class="'+defClass+'" id="def-'+i+'">'+hl(d,lang==='uz'?q:'')+'</div>'
    +expandBtn
    +'</div>'
    +'<div class="entry-actions">'+actions+'</div>'
    +'<div class="inline-editor" id="ied-'+i+'"></div>'
    +'</div>';
}

function renderPage(filtered,page,q,append){
  const main=document.getElementById('main');
  const start=page*pageSize,end=start+pageSize;
  const slice=filtered.slice(start,end);
  if(!slice.length)return;

  let html='';
  // When searching, show flat list (sorted by score). When browsing, group by letter.
  if(q){
    for(const e of slice) html+=entryHTML(e,q);
  } else {
    const grouped={};
    for(const e of slice){
      const l=entryLetter(e);
      if(!grouped[l])grouped[l]=[];
      grouped[l].push(e);
    }
    for(const letter of Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'uz'))){
      const firstIdx=filtered.findIndex(e=>{
        const l=entryLetter(e);
        return l===letter;
      });
      if(firstIdx>=start&&firstIdx<end){
        html+=`<div class="letter-group" id="lg-${letter}"><div class="letter-head">${esc(letter)}</div>`;
      } else {
        const ex=document.getElementById(`lg-${letter}`);
        if(ex){for(const e of grouped[letter])ex.insertAdjacentHTML('beforeend',entryHTML(e,q));continue;}
        html+=`<div class="letter-group" id="lg-${letter}">`;
      }
      for(const e of grouped[letter])html+=entryHTML(e,q);
      html+='</div>';
    }
  }

  const sentinel=document.getElementById('scroll-sentinel');
  if(sentinel)sentinel.remove();
  if(append)main.insertAdjacentHTML('beforeend',html);
  else main.innerHTML=html;
  if(end<filtered.length){
    main.insertAdjacentHTML('beforeend','<div id="scroll-sentinel" style="height:60px"></div>');
    if(observer)observer.disconnect();
    const s=document.getElementById('scroll-sentinel');
    observer=new IntersectionObserver(es=>{
      if(es[0].isIntersecting){observer.disconnect();renderPage(filtered,page+1,q,true);}
    },{rootMargin:'300px'});
    observer.observe(s);
  }
}

function _render(){
  const main=document.getElementById('main');
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(observer){observer.disconnect();observer=null;}
  filteredCache=buildFiltered();
  const total=filteredCache.length;
  document.getElementById('rc').textContent=total&&q?`${total.toLocaleString()} natija`:'';
  if(q.length>=2) maybeAddHistory(q);
  if(!filteredCache.length){
    main.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><p>Hech narsa topilmadi</p></div>';
    return;
  }
  main.innerHTML='';
  renderPage(filteredCache,0,q,false);
}

function openEditor(i,field){
  document.querySelectorAll('.inline-editor.show').forEach(el=>{if(el.id!==`ied-${i}`)el.classList.remove('show');});
  const box=document.getElementById(`ied-${i}`);
  const e=entries[i];
  const label=field==='ru'?'Rus tarjimasi':field==='def'?'Izoh':'So\'z';
  const val=field==='ru'?(e.ru||''):e[field];
  const isTa=field==='def';
  box.innerHTML=`
    <div class="ie-label">${label}</div>
    ${isTa?`<textarea class="ie-input" id="ie-val-${i}" rows="4">${esc(val)}</textarea>`
           :`<input class="ie-input mono" id="ie-val-${i}" type="text" value="${esc(val)}">`}
    <div class="ie-actions">
      <button class="ie-ok" onclick="saveField(${i},'${field}')">Сақлаш</button>
      <button class="ie-cancel" onclick="closeEditor(${i})">Бекор</button>
    </div>`;
  box.classList.add('show');
  const inp=document.getElementById(`ie-val-${i}`);
  inp.focus();
  if(inp.setSelectionRange)inp.setSelectionRange(inp.value.length,inp.value.length);
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Escape')closeEditor(i);
    if(ev.key==='Enter'&&!isTa)saveField(i,field);
  });
}
function closeEditor(i){const b=document.getElementById(`ied-${i}`);if(b)b.classList.remove('show');}
function saveField(i,field){
  const inp=document.getElementById(`ie-val-${i}`);if(!inp)return;
  const val=inp.value.trim();
  entries[i][field]=val;
  recordPatch(i);closeEditor(i);
  if(field==='ru'){const el=document.getElementById(`ru-${i}`);if(el){el.textContent=val||'—';el.className='entry-ru'+(val?'':' empty');}}
  else if(field==='def'){const el=document.getElementById(`def-${i}`);if(el)el.textContent=val;}
  else if(field==='word'){const el=document.getElementById(`word-${i}`);if(el)el.textContent=disp(val);}
}
function recordPatch(i){
  const e=entries[i];
  patches[e.word]={word:e.word,def:e.def,ru:e.ru||'',_deleted:e._deleted||false};
  changes++;
  document.getElementById('change-count').textContent="" + changes + " o'zgarish";
  const pb=document.getElementById('patch-btn');
  pb.disabled=false;
}
function deleteEntry(i){
  entries[i]._deleted=true;recordPatch(i);
  const el=document.getElementById(`entry-${i}`);
  if(el){el.classList.add('deleted');const a=el.querySelector('.entry-actions');if(a)a.innerHTML=`<button class="act restore" onclick="restoreEntry(${i})">↩ Tiklash</button>`;}
}
function restoreEntry(i){entries[i]._deleted=false;recordPatch(i);render();}

function exportPatch(){
  const list=Object.values(patches);
  if(!list.length){alert('Ўзгаришлар йўқ.');return;}
  dl(JSON.stringify({created:new Date().toISOString(),count:list.length,patches:list},null,2),`lugat_patch_${new Date().toISOString().slice(0,10)}.json`);
}
function exportJSON(){
  dl(JSON.stringify(entries.filter(e=>!e._deleted).map(e=>({word:e.word,def:e.def,ru:e.ru||''})),null,2),'dictionary_enriched.json');
}
function dl(content,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'application/json'}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}

async function load(){
  const status=document.getElementById('status');
  status.classList.add('show');
  try{
    let resp=await fetch('dictionary_enriched.json');
    document.getElementById('pf').style.width='40%';
    if(!resp.ok)resp=await fetch('dictionary_parsed.json');
    document.getElementById('pf').style.width='80%';
    const raw=await resp.json();
    entries=Array.isArray(raw)?raw:Object.values(raw);
    document.getElementById('pf').style.width='100%';
    document.getElementById('h-count').textContent=entries.length.toLocaleString()+" so'z";
    const _hasRu=entries.some(e=>e.ru);
    document.getElementById('btn-ru').disabled=!_hasRu;
    const _bruM=document.getElementById('btn-ru-m');if(_bruM)_bruM.disabled=!_hasRu;
    status.classList.remove('show');
    loadPrefs();
    loadFavs();
    buildAlpha();
    applyURL();
    if(!document.getElementById('search').value) render();
  }catch(err){
    document.getElementById('status-txt').textContent='Xato: '+err.message;
    document.getElementById('pf').style.background='#dc2626';
    document.getElementById('pf').style.width='100%';
  }
}

// ── PHASE 4: MOBILE ──────────────────────────────────────────────
let alphaVisible = true;

function bnSetActive(id) {
  document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function bnSearch() {
  bnSetActive('bn-search');
  const inp = document.getElementById('search');
  inp.focus();
  inp.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function bnAlpha() {
  const bar = document.getElementById('alpha-bar');
  alphaVisible = !alphaVisible;
  bar.style.display = alphaVisible ? '' : 'none';
  bnSetActive('bn-alpha');
  if (alphaVisible) bar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Keep mobile fav badge in sync
function updateMobileFavBadge() {
  const badge = document.getElementById('bn-fav-badge');
  if (badge) {
    const n = favs.size;
    badge.textContent = n;
    badge.classList.toggle('show', n > 0);
  }
}

// Override saveFavs to also update mobile badge
const _saveFavsOrig = saveFavs;
// patch updateFavCount to also update mobile
const _updateFavCountOrig = updateFavCount;

// Swipe down to dismiss search keyboard
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;

    document.getElementById('search').blur();
    hideDropdown();

// ── PHASE 3: THEME, FONT SIZE, DENSITY ──────────────────────────
const PREFS_KEY = 'lugat_prefs';

function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem(PREFS_KEY)) || {};
    setTheme(p.theme || 'system', true);
    setSize(p.size || 'md', true);
    setDensity(p.density || 'normal', true);
  } catch { }
}

function savePrefs() {
  try {
    const p = {
      theme: document.documentElement.dataset.themeChoice || 'system',
      size: document.documentElement.dataset.size || 'md',
      density: document.documentElement.dataset.density || 'normal'
    };
    localStorage.setItem(PREFS_KEY, JSON.stringify(p));
  } catch { }
}

function setTheme(t, silent) {
  document.documentElement.dataset.themeChoice = t;
  const isDark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  ['light','dark','system'].forEach(x => {
    const el = document.getElementById(`theme-${x}`);
    if (el) el.classList.toggle('active', x === t);
  });
  if (!silent) savePrefs();
}

function setSize(s, silent) {
  document.documentElement.dataset.size = s;
  ['sm','md','lg'].forEach(x => {
    const el = document.getElementById(`size-${x}`);
    if (el) el.classList.toggle('active', x === s);
  });
  if (!silent) savePrefs();
}

function setDensity(d, silent) {
  document.documentElement.dataset.density = d;
  ['compact','normal','comfortable'].forEach(x => {
    const el = document.getElementById(`density-${x}`);
    if (el) el.classList.toggle('active', x === d);
  });
  if (!silent) savePrefs();
}

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('open');
  // close if clicking outside
  if (panel.classList.contains('open')) {
    setTimeout(() => {
      document.addEventListener('click', closeSettingsOutside, { once: true });
    }, 0);
  }
}

function closeSettingsOutside(e) {
  const panel = document.getElementById('settings-panel');
  const btn = document.getElementById('settings-btn');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
}

// Watch system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (document.documentElement.dataset.themeChoice === 'system') setTheme('system');
});

// ── FAVORITES ────────────────────────────────────────────────────
const FAV_KEY = 'lugat_favs';
let favs = new Set();

function loadFavs() {
  try { favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY)) || []); } catch { favs = new Set(); }
  updateFavCount();
}
function saveFavs() {
  try { localStorage.setItem(FAV_KEY, JSON.stringify([...favs])); } catch {}
  updateFavCount();
}
function updateFavCount() {
  const n = favs.size;
  const el = document.getElementById('fav-count');
  if (el) { el.textContent = n; el.classList.toggle('show', n > 0); }
  const badge = document.getElementById('bn-fav-badge');
  if (badge) { badge.textContent = n; badge.classList.toggle('show', n > 0); }
}
function toggleFav(i) {
  const word = entries[i].word;
  if (favs.has(word)) favs.delete(word);
  else favs.add(word);
  saveFavs();
  const btn = document.getElementById(`fav-${i}`);
  if (btn) btn.classList.toggle('active', favs.has(word));
  if (document.getElementById('fav-panel').classList.contains('open')) renderFavPanel();
}
function toggleFavPanel() {
  const panel = document.getElementById('fav-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderFavPanel();
}
function renderFavPanel() {
  const list = document.getElementById('fav-list');
  const favEntries = entries.filter(e => favs.has(e.word));
  document.getElementById('fav-footer-count').textContent = "" + favEntries.length + " ta so'z";
  if (!favEntries.length) {
    list.innerHTML = '<div class="fav-empty">Hali hech narsa saqlanmagan.<br>★ tugmasini bosing.</div>';
    return;
  }
  list.innerHTML = favEntries.map(e => `
    <div class="fav-entry" onclick="jumpToWord('${esc(e.word)}')">
      <div class="fav-entry-word">${esc(disp(e.word))}</div>
      ${e.ru ? `<div class="fav-entry-ru">${esc(e.ru)}</div>` : ''}
    </div>`).join('');
}
function clearFavs() {
  if (!confirm("Barcha saqlangan so'zlarni o'chirish?")) return;
  favs.clear(); saveFavs();
  document.querySelectorAll('.fav-btn.active').forEach(b => b.classList.remove('active'));
  renderFavPanel();
}
function jumpToWord(word) {
  toggleFavPanel();
  const inp = document.getElementById('search');
  inp.value = word;
  render();
  setTimeout(() => {
    const idx = entries.findIndex(e => e.word === word);
    if (idx >= 0) {
      const el = document.getElementById(`entry-${idx}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 200);
}

// ── EXPAND ENTRY ─────────────────────────────────────────────────
function expandEntry(event, i) {
  if (event.target.closest('.entry-actions') || event.target.closest('.inline-editor') || event.target.closest('.fav-btn')) return;
  const el = document.getElementById(`entry-${i}`);
  if (!el) return;
  const isExpanded = el.classList.contains('expanded');
  el.classList.toggle('expanded', !isExpanded);
  const hint = document.getElementById(`hint-${i}`);
  if (hint) hint.textContent = isExpanded ? '&#x25be; Ko\'proq' : 'Yopish ↑';
}

// ── COPY ENTRY ───────────────────────────────────────────────────
let toastTimer = null;
function copyEntry(i) {
  const e = entries[i];
  const text = `${disp(e.word)}${e.ru ? ' — ' + e.ru : ''}\n${disp(e.def)}`;
  navigator.clipboard.writeText(text).then(() => showToast('Nusxalandi ✓')).catch(() => showToast('Xato'));
}
function showToast(msg) {
  const t = document.getElementById('copy-toast');
  clearTimeout(toastTimer);
  t.classList.remove('show');
  t.textContent = msg;
  void t.offsetHeight; // force reflow
  t.classList.add('show');
  toastTimer = setTimeout(() => { t.classList.remove('show'); toastTimer = null; }, 2200);
}

// ── SEARCH HISTORY ──────────────────────────────────────────────
const HISTORY_KEY = 'lugat_history';
const MAX_HISTORY = 10;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}
function addHistory(q) {
  if (!q || q.length < 2) return;
  let h = getHistory().filter(x => x !== q);
  h.unshift(q);
  h = h.slice(0, MAX_HISTORY);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch {}
}
function clearHistory() {
  try { localStorage.removeItem(HISTORY_KEY); } catch {}
  hideDropdown();
}

function showDropdown() {
  const h = getHistory();
  const dd = document.getElementById('search-dropdown');
  if (!h.length) { hideDropdown(); return; }
  dd.innerHTML = `<div class="sd-label">So'nggi qidiruvlar</div>` +
    h.map(q => `<div class="sd-item" onclick="pickHistory('${esc(q)}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${esc(q)}
    </div>`).join('') +
    `<div class="sd-clear" onclick="clearHistory()">Tarixni tozalash</div>`;
  dd.classList.add('show');
}
function hideDropdown() {
  document.getElementById('search-dropdown').classList.remove('show');
}
function pickHistory(q) {
  const inp = document.getElementById('search');
  inp.value = q;
  hideDropdown();
  inp.focus();
  onSearchInput();
}

// ── URL SYNC ─────────────────────────────────────────────────────
function pushURL(q, word) {
  const params = new URLSearchParams();
  if (word) params.set('word', word);
  else if (q) params.set('q', q);
  const url = params.toString() ? `?${params}` : location.pathname;
  history.pushState({ q, word }, '', url);
}

function readURL() {
  const params = new URLSearchParams(location.search);
  return { q: params.get('q') || '', word: params.get('word') || '' };
}

function applyURL() {
  const { q, word } = readURL();
  const inp = document.getElementById('search');
  if (word) {
    inp.value = word;
    render();
    // after render, scroll to the word
    setTimeout(() => {
      const entry = entries.find(e => e.word === word);
      if (entry) {
        const idx = entries.indexOf(entry);
        const el = document.getElementById(`entry-${idx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 300);
  } else if (q) {
    inp.value = q;
    render();
  }
}

window.addEventListener('popstate', () => {
  const { q, word } = readURL();
  const inp = document.getElementById('search');
  inp.value = word || q || '';
  render();
});

// ── KEYBOARD SHORTCUT ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Cmd+K or / to focus search
  if ((e.metaKey && e.key === 'k') || (e.key === '/' && document.activeElement !== document.getElementById('search'))) {
    e.preventDefault();
    const inp = document.getElementById('search');
    inp.focus();
    inp.select();
    showDropdown();
  }
  // Escape to blur search
  if (e.key === 'Escape') {
    document.getElementById('search').blur();
    hideDropdown();
  }
});

// ── SEARCH INPUT HANDLER ─────────────────────────────────────────
function onSearchInput() {
  const q = document.getElementById('search').value.trim();
  hideDropdown();
  clearTimeout(timer);
  timer = setTimeout(() => {
    render();
    if (q.length >= 2) {
      pushURL(q, '');
    } else if (!q) {
      pushURL('', '');
    }
  }, 80);
}

// Search box focus/blur
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('search');
  inp.addEventListener('focus', () => {
    if (!inp.value) showDropdown();
  });
  inp.addEventListener('blur', () => {
    setTimeout(hideDropdown, 150);
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = inp.value.trim();
      if (q.length >= 2) addHistory(q);
      hideDropdown();
    }
  });
});

// Save to history on enter or after 2s of no typing with results
let historyTimer = null;
function maybeAddHistory(q) {
  clearTimeout(historyTimer);
  if (q.length < 2) return;
  historyTimer = setTimeout(() => addHistory(q), 2000);
}

document.getElementById('search').addEventListener('input', onSearchInput);
load();
</script>
